<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>securAI — Interactive Pitch · NURAI 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a; --bg2:#111728; --card:#161d33; --card2:#1c2540;
  --cyan:#22d3ee; --blue:#3b82f6; --violet:#8b5cf6;
  --amber:#fbbf24; --green:#34d399; --red:#f87171;
  --text:#e8edf7; --muted:#94a3b8; --line:rgba(255,255,255,.10);
  --grad:linear-gradient(120deg,#22d3ee 0%,#3b82f6 50%,#8b5cf6 100%);
  --glass:rgba(22,29,51,.55);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
  user-select:none;-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono',monospace}

/* ===== STAGE ===== */
#app{position:fixed;inset:0;overflow:hidden}
#bgCanvas{position:absolute;inset:0;z-index:1}
.stage{position:absolute;inset:0;z-index:2}
.scene{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  opacity:0;transition:opacity .6s ease}
.scene.show{display:flex;opacity:1;animation:sceneIn .8s cubic-bezier(.2,.8,.2,1) both}
@keyframes sceneIn{
  0%{opacity:0;transform:scale(1.045);filter:blur(9px) brightness(1.15)}
  55%{opacity:1}
  100%{opacity:1;transform:scale(1);filter:blur(0) brightness(1)}
}

/* ===== HUD FRAME ===== */
.hud{position:absolute;inset:0;z-index:20;pointer-events:none}
.hud-tl{position:absolute;top:22px;left:24px;display:flex;align-items:center;gap:12px}
.nurai-chip{display:flex;align-items:center;gap:9px;background:var(--glass);
  backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:12px;padding:7px 13px}
.nurai-chip img{height:30px;width:auto;filter:brightness(1.25) drop-shadow(0 0 6px rgba(59,130,246,.5))}
.nurai-chip .lab{font-size:.62rem;letter-spacing:2px;color:var(--muted);font-weight:700}
.hud-tr{position:absolute;top:22px;right:24px;display:flex;align-items:center;gap:14px}
.wordmark{font-size:1.45rem;font-weight:900;letter-spacing:-.5px;display:flex;align-items:center;gap:7px}
.wordmark .lock{width:26px;height:26px;border-radius:7px;background:var(--grad);
  display:grid;place-items:center;box-shadow:0 0 14px rgba(34,211,238,.5)}
.wordmark .lock svg{width:15px;height:15px}
.wordmark .ai{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.solar-gauge{display:flex;align-items:center;gap:8px;background:var(--glass);
  backdrop-filter:blur(12px);border:1px solid rgba(251,191,36,.3);border-radius:11px;padding:7px 12px}
.solar-gauge .sun{font-size:1rem;animation:spin 9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.solar-gauge .bar{width:54px;height:6px;border-radius:99px;background:rgba(255,255,255,.12);overflow:hidden}
.solar-gauge .bar i{display:block;height:100%;background:linear-gradient(90deg,#fbbf24,#34d399);border-radius:99px;transition:width 1s}
.solar-gauge .pct{font-size:.78rem;font-weight:800;color:var(--amber)}
.uob-wm{position:absolute;bottom:20px;right:24px;opacity:.12}
.uob-wm img{height:78px}

/* act ribbon */
.act-ribbon{position:absolute;bottom:24px;left:24px;display:flex;align-items:center;gap:10px;
  font-size:.7rem;letter-spacing:2px;color:var(--muted);font-weight:700}
.act-ribbon .dotrow{display:flex;gap:5px}
.act-ribbon .d{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);transition:.3s}
.act-ribbon .d.on{background:var(--cyan);box-shadow:0 0 8px var(--cyan)}

/* ===== GLASS POP-UP (variable anchored, no-overlap) ===== */
.popup{position:absolute;--tx:0px;--ty:0px;z-index:25;width:min(640px,84vw);max-height:80vh;overflow:auto;
  min-width:280px;min-height:90px;resize:both;cursor:grab;touch-action:none;
  background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:20px;
  padding:22px 26px 30px;box-shadow:0 30px 70px rgba(0,0,0,.55);opacity:0;pointer-events:auto;
  transform:translate(var(--tx),calc(var(--ty) + 22px)) scale(.94);
  transition:opacity .4s, transform .5s cubic-bezier(.2,1.05,.3,1)}
.popup.show{opacity:1;transform:translate(var(--tx),var(--ty)) scale(1)}
.popup.dim{opacity:.34}
.popup.dragging{cursor:grabbing;transition:none;box-shadow:0 36px 90px rgba(0,0,0,.6),0 0 0 1px rgba(34,211,238,.4)}
.popup::after{content:'⤡';position:absolute;right:7px;bottom:5px;font-size:.78rem;color:var(--muted);opacity:.55;pointer-events:none}
.popup input{cursor:default}
/* anchors — every step picks one so the card never sits on top of scene text */
.popup.bc{left:50%;right:auto;bottom:7%;top:auto;--tx:-50%;--ty:0px}
.popup.tc{left:50%;right:auto;top:12%;bottom:auto;--tx:-50%;--ty:0px}
.popup.cl{left:3.5%;right:auto;top:50%;bottom:auto;--tx:0px;--ty:-50%}
.popup.cr{right:3.5%;left:auto;top:50%;bottom:auto;--tx:0px;--ty:-50%}
.popup.tl{left:3.5%;right:auto;top:13%;bottom:auto;--tx:0px;--ty:0px}
.popup.tr{right:3.5%;left:auto;top:13%;bottom:auto;--tx:0px;--ty:0px}
.popup.bl{left:3.5%;right:auto;bottom:11%;top:auto;--tx:0px;--ty:0px}
.popup.br{right:3.5%;left:auto;bottom:11%;top:auto;--tx:0px;--ty:0px}
.popup.cl,.popup.cr,.popup.tl,.popup.tr,.popup.bl,.popup.br{width:min(420px,82vw)}
.popup::before{content:'';position:absolute;left:0;top:18px;bottom:18px;width:3px;border-radius:99px;background:var(--grad)}
.popup .chip{display:inline-block;font-size:.66rem;letter-spacing:2.5px;font-weight:800;
  color:var(--cyan);margin-bottom:9px;font-family:'JetBrains Mono',monospace}
.popup h2{font-size:clamp(1.3rem,2.6vw,1.95rem);font-weight:900;letter-spacing:-.5px;line-height:1.12;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.popup .sub{font-size:1.15rem;font-weight:800;color:var(--text);margin-top:2px}
.popup p{color:var(--text);font-size:1.02rem;line-height:1.5;margin-top:9px;opacity:.92;font-weight:400}
.popup .data{display:flex;flex-wrap:wrap;gap:8px;margin-top:15px}
.popup .data span{font-family:'JetBrains Mono',monospace;font-size:.74rem;font-weight:600;
  background:var(--card2);border:1px solid var(--line);color:var(--cyan);padding:5px 11px;border-radius:8px}
.popup.alert::before{background:var(--red)}
.popup.alert h2{background:linear-gradient(120deg,#f87171,#fbbf24);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.popup.alert .data span{color:var(--red);border-color:rgba(248,113,113,.35)}
.popup.solar::before{background:linear-gradient(180deg,#fbbf24,#34d399)}
.popup.solar h2{background:linear-gradient(120deg,#fbbf24,#34d399);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.popup.solar .data span{color:var(--amber);border-color:rgba(251,191,36,.35)}

/* hint */
.hint{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);z-index:25;
  font-size:.74rem;letter-spacing:1px;color:var(--muted);font-weight:600;display:flex;gap:16px;align-items:center}
.hint kbd{font-family:'JetBrains Mono',monospace;background:var(--card2);border:1px solid var(--line);
  border-bottom-width:2px;border-radius:6px;padding:2px 8px;color:var(--text);font-size:.72rem}
.counter{position:absolute;top:50%;right:26px;transform:translateY(-50%);z-index:21;
  font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);writing-mode:vertical-rl;
  letter-spacing:3px;font-weight:700}

/* ===== IDLE ===== */
.idle-wrap{text-align:center}
.idle-logo{width:120px;height:120px;border-radius:30px;background:var(--grad);display:grid;place-items:center;
  margin:0 auto 26px;box-shadow:0 0 60px rgba(34,211,238,.5);animation:breathe 3s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1);box-shadow:0 0 50px rgba(34,211,238,.4)}50%{transform:scale(1.05);box-shadow:0 0 80px rgba(139,92,246,.6)}}
.idle-logo svg{width:64px;height:64px}
.idle-wrap h1{font-size:3.2rem;font-weight:900;letter-spacing:-1px}
.idle-wrap h1 .ai{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.idle-wrap .tagline{color:var(--muted);font-size:1.1rem;margin-top:6px;font-weight:500}
.idle-logos{display:flex;gap:34px;align-items:center;justify-content:center;margin:38px 0 30px}
.idle-logos img{height:84px;filter:drop-shadow(0 6px 20px rgba(0,0,0,.5))}
.idle-logos .uob{background:#fff;border-radius:50%;padding:5px}
.press{display:inline-flex;align-items:center;gap:10px;color:var(--cyan);font-weight:700;font-size:.95rem;
  animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.press kbd{font-family:'JetBrains Mono',monospace;background:var(--card2);border:1px solid var(--cyan);
  border-radius:7px;padding:4px 11px}

/* ===== TEAM ===== */
.team-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;width:min(900px,88vw)}
.tcard{background:var(--glass);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:18px;
  padding:22px;position:relative;overflow:hidden;opacity:0;transform:translateY(24px) scale(.96);
  transition:.5s cubic-bezier(.2,1.1,.3,1)}
.tcard.in{opacity:1;transform:none}
.tcard::after{content:'';position:absolute;inset:0;border-radius:18px;border:1px solid transparent;
  background:var(--grad) border-box;-webkit-mask:linear-gradient(#000 0 0) padding-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;opacity:.5}
.tcard .glyph{width:48px;height:48px;border-radius:13px;background:var(--card2);border:1px solid var(--line);
  display:grid;place-items:center;font-size:1.5rem;margin-bottom:13px}
.tcard .role-tag{font-size:.6rem;letter-spacing:2px;font-weight:800;color:var(--cyan);text-transform:uppercase}
.tcard h3{font-size:1.32rem;font-weight:900;margin:7px 0 8px;letter-spacing:-.3px}
.tcard p{font-size:.82rem;color:var(--muted);line-height:1.5;font-weight:500}
.tcard.leader{border-color:rgba(251,191,36,.4)}
.tcard.leader .role-tag{color:var(--amber)}
.tcard .lead-badge{position:absolute;top:18px;right:18px;font-size:.58rem;letter-spacing:1.5px;font-weight:800;
  background:rgba(251,191,36,.15);color:var(--amber);border:1px solid rgba(251,191,36,.4);padding:3px 9px;border-radius:7px}

/* ===== SUPERVISOR ===== */
.monolith{text-align:center}
.mono-pillar{width:200px;height:240px;margin:0 auto 24px;border-radius:18px;
  background:linear-gradient(180deg,rgba(34,211,238,.12),rgba(139,92,246,.06));
  border:1px solid rgba(255,255,255,.14);display:grid;place-items:center;position:relative;
  box-shadow:0 0 80px rgba(251,191,36,.25),inset 0 0 60px rgba(34,211,238,.1)}
.mono-pillar::before{content:'';position:absolute;inset:-2px;border-radius:20px;background:var(--grad);z-index:-1;opacity:.4;filter:blur(14px)}
.mono-core{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,#fff,#fbbf24);
  box-shadow:0 0 50px #fbbf24;animation:breathe 2.5s ease-in-out infinite}
.monolith .sup-role{font-size:.66rem;letter-spacing:3px;color:var(--muted);font-weight:800;margin-bottom:8px}
.monolith h2{font-size:2.4rem;font-weight:900;letter-spacing:-.5px}
.monolith .sub{color:var(--muted);font-style:italic;margin-top:8px;font-size:1.05rem}

/* ===== STORE MAP — premium isometric 3D ===== */
.smap{width:min(940px,93vw);aspect-ratio:16/10;position:relative;perspective:1500px}
.smap-stage{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .3s ease-out}
.smap-inner{position:absolute;inset:0;transform-style:preserve-3d;animation:smapFloat 8s ease-in-out infinite}
@keyframes smapFloat{0%,100%{transform:translateY(0) rotateZ(0)}50%{transform:translateY(-10px) rotateZ(.3deg)}}
.smap svg{position:absolute;inset:0;width:100%;height:100%;filter:drop-shadow(0 50px 60px rgba(0,0,0,.6))}
.smap-label{position:absolute;font-size:.6rem;font-weight:800;letter-spacing:.6px;color:#e9f7fb;
  background:linear-gradient(160deg,rgba(22,29,51,.85),rgba(12,16,28,.8));border:1px solid rgba(34,211,238,.35);
  padding:6px 11px;border-radius:10px;backdrop-filter:blur(8px);box-shadow:0 10px 26px rgba(0,0,0,.5);
  white-space:nowrap;opacity:0;transform:translateY(10px) scale(.94);transition:.55s cubic-bezier(.2,1.1,.3,1)}
.smap-label.in{opacity:1;transform:none}
.smap-label .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--cyan);
  box-shadow:0 0 8px var(--cyan);margin-inline-end:7px;vertical-align:middle}
.smap-label.amber{border-color:rgba(251,191,36,.45);color:#fde9b8}.smap-label.amber .dot{background:var(--amber);box-shadow:0 0 8px var(--amber)}
.smap-label.green{border-color:rgba(52,211,153,.45)}.smap-label.green .dot{background:var(--green);box-shadow:0 0 8px var(--green)}

/* ===== POV — studio corridor ===== */
.pov{width:100%;height:100%;position:relative;overflow:hidden;background:#070a14}
.pov-corridor{position:absolute;inset:0}
.pov-bloom{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);width:34%;height:48%;border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,240,205,.55),rgba(255,210,150,.16) 45%,transparent 70%);
  filter:blur(8px);pointer-events:none;z-index:2;animation:bloomP 5s ease-in-out infinite}
@keyframes bloomP{0%,100%{opacity:.85}50%{opacity:1}}
.pov-haze{position:absolute;inset:0;pointer-events:none;z-index:3;
  background:radial-gradient(ellipse at 50% 46%,transparent 30%,rgba(10,14,26,.25) 70%)}
.pov-vignette{position:absolute;inset:0;pointer-events:none;z-index:11;box-shadow:inset 0 0 220px rgba(5,8,15,.92)}
.pcam{position:absolute;top:6%;left:50%;transform:translateX(-50%);width:54px;height:40px;z-index:6}
.pcam .dome{width:54px;height:30px;border-radius:0 0 27px 27px;background:linear-gradient(180deg,#2a3450,#11192c);
  border:1px solid rgba(255,255,255,.16);box-shadow:0 8px 18px rgba(0,0,0,.5)}
.pcam .lens{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:16px;height:16px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#3bd6ee,#0a2433);box-shadow:0 0 12px rgba(34,211,238,.7)}
.pcam .sring{position:absolute;top:1px;left:50%;transform:translateX(-50%);width:30px;height:5px;border-radius:99px;background:rgba(251,191,36,.6);box-shadow:0 0 8px rgba(251,191,36,.5)}

/* premium product — coffee can */
.product{position:absolute;width:86px;height:130px;z-index:6;
  transition:transform .65s cubic-bezier(.3,1,.4,1),opacity .5s;
  filter:drop-shadow(0 26px 26px rgba(0,0,0,.6))}
.product .can{position:absolute;inset:0;border-radius:10px/13px;overflow:hidden;
  background:linear-gradient(90deg,#0c1830 0%,#1c3a66 16%,#3f72b8 36%,#cfe6ff 50%,#3f72b8 64%,#1c3a66 84%,#0c1830 100%)}
.product .can::before{content:'';position:absolute;top:0;bottom:0;left:20%;width:8%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.85),transparent);filter:blur(1.5px)}
.product .lid{position:absolute;top:-5px;left:1px;right:1px;height:15px;border-radius:50%;
  background:linear-gradient(180deg,#eef5fd,#9fbbdf 55%,#6582a8);border:1px solid rgba(255,255,255,.4);z-index:3}
.product .base{position:absolute;bottom:-3px;left:2px;right:2px;height:9px;border-radius:50%;background:#081020;z-index:1}
.product .label{position:absolute;top:30%;left:0;right:0;height:46%;z-index:2;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;text-align:center;
  background:linear-gradient(90deg,rgba(6,10,20,0),rgba(6,10,20,.92) 24%,rgba(6,10,20,.92) 76%,rgba(6,10,20,0))}
.product .label .bean{font-size:.95rem}
.product .label .b{font-size:.5rem;font-weight:900;letter-spacing:1px;color:#46e0f5}
.product .label .t{font-size:.4rem;color:#bcd0ea;letter-spacing:.5px}
.product .bbox{position:absolute;inset:-12px;border:2px solid var(--cyan);border-radius:7px;opacity:0;transition:.3s;
  box-shadow:0 0 18px var(--cyan)}
.product .bbox::before,.product .bbox::after{content:'';position:absolute;width:12px;height:12px;border:2px solid var(--cyan)}
.product .bbox::before{top:-2px;left:-2px;border-right:none;border-bottom:none}
.product .bbox::after{bottom:-2px;right:-2px;border-left:none;border-top:none}
.product .bbox.on{opacity:1}
.product .tag{position:absolute;top:-30px;left:50%;transform:translateX(-50%);white-space:nowrap;opacity:0;transition:.3s;
  font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--cyan);background:rgba(10,14,26,.8);
  border:1px solid rgba(34,211,238,.4);padding:2px 7px;border-radius:5px}
.product .bbox.on ~ .tag,.product.tagged .tag{opacity:1}
.product.bagged{transform:translateY(150px) scale(.32);opacity:0}

/* realistic hand */
.hand{position:absolute;width:170px;height:210px;z-index:7;opacity:0;pointer-events:none;
  transform:translate(60px,110px) rotate(-10deg) scale(.95);
  transition:transform .75s cubic-bezier(.3,.9,.4,1),opacity .4s;
  filter:drop-shadow(0 22px 22px rgba(0,0,0,.55))}
.hand.reach{transform:translate(-46px,-30px) rotate(-20deg) scale(1.05)}
.hand.grab{transform:translate(-46px,-30px) rotate(-20deg) scale(.99)}

/* interactive phone */
.phone{position:absolute;left:50%;bottom:4%;transform:translateX(-50%);width:174px;height:348px;z-index:9;cursor:pointer;
  transition:transform .55s cubic-bezier(.3,1,.4,1)}
.phone.expanded{bottom:50%;transform:translate(-50%,50%) scale(1.62);z-index:32}
.phone .frame{position:absolute;inset:0;border-radius:34px;padding:7px;
  background:linear-gradient(155deg,#3c4456,#171c28 58%,#0b0e16);
  box-shadow:0 34px 70px rgba(0,0,0,.7),inset 0 0 0 1px rgba(255,255,255,.1),0 0 0 1.5px #05070d}
.phone .frame::before{content:'';position:absolute;top:16%;left:-2px;width:3px;height:7%;background:#2a3142;border-radius:3px}
.phone .frame::after{content:'';position:absolute;top:30%;right:-2px;width:3px;height:13%;background:#2a3142;border-radius:3px}
.phone .screen{position:absolute;inset:7px;border-radius:28px;overflow:hidden;background:#070b14;
  background-image:radial-gradient(circle at 50% -10%,rgba(34,211,238,.14),transparent 55%)}
.phone .island{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:48px;height:14px;border-radius:99px;background:#000;z-index:6}
.phone .gloss{position:absolute;inset:7px;border-radius:28px;pointer-events:none;z-index:7;
  background:linear-gradient(135deg,rgba(255,255,255,.16),transparent 38%)}
.phone .taphint{position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);font-size:.58rem;color:var(--cyan);
  font-weight:800;white-space:nowrap;animation:pulse 1.6s infinite}
.phone.expanded .taphint{display:none}
.phone-backdrop{position:absolute;inset:0;z-index:25;background:rgba(5,8,15,.62);backdrop-filter:blur(3px);
  opacity:0;pointer-events:none;transition:.4s}
.phone-backdrop.on{opacity:1;pointer-events:auto}
/* phone screens */
.ph-app{position:absolute;inset:0;padding:32px 14px 16px;display:flex;flex-direction:column;color:#e8edf7}
.ph-brand{font-size:.8rem;font-weight:900;text-align:center}.ph-brand .ai{color:var(--cyan)}
.ph-title{font-size:.6rem;color:var(--muted);text-align:center;margin-top:2px;letter-spacing:.5px}
.ph-bigicon{font-size:2.6rem;text-align:center;margin:auto 0 6px;filter:drop-shadow(0 0 18px rgba(34,211,238,.4))}
.ph-opt{margin-top:11px;padding:12px;border-radius:13px;border:1px solid var(--line);background:var(--card2);
  display:flex;align-items:center;gap:9px;font-size:.66rem;font-weight:700;cursor:pointer;transition:.2s}
.ph-opt:hover{border-color:var(--cyan);transform:translateY(-1px)}
.ph-opt.qr{border-color:rgba(34,211,238,.45);background:rgba(34,211,238,.1);color:var(--cyan)}
.ph-opt.sel{border-color:var(--green);background:rgba(52,211,153,.14);color:var(--green)}
.ph-opt .ic{font-size:1rem}
.ph-note{margin-top:auto;font-size:.5rem;color:var(--muted);text-align:center;line-height:1.5}
.ph-verified{position:absolute;inset:7px;border-radius:28px;background:rgba(7,11,20,.92);backdrop-filter:blur(4px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;opacity:0;pointer-events:none;
  transition:.4s;z-index:8}
.ph-verified.on{opacity:1}
.ph-verified .vcheck{width:54px;height:54px;border-radius:50%;background:var(--green);color:#04121a;display:grid;place-items:center;
  font-size:1.8rem;font-weight:900;box-shadow:0 0 30px rgba(52,211,153,.6);animation:popCheck .5s cubic-bezier(.2,1.4,.3,1)}
@keyframes popCheck{from{transform:scale(0)}to{transform:scale(1)}}
.ph-verified .vt{font-size:.7rem;font-weight:800;color:var(--green)}
.ph-verified .vs{font-size:.54rem;color:var(--muted)}
.ph-bk-h{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:.58rem;font-weight:800;color:var(--muted);letter-spacing:1px}
.ph-bk-h .live{color:var(--green);display:flex;align-items:center;gap:4px}
.ph-bk-h .live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 1.4s infinite}
.ph-list{flex:1;overflow:auto;margin-top:4px}
.ph-bitem{display:flex;justify-content:space-between;align-items:center;font-size:.62rem;padding:9px 0;border-bottom:1px solid var(--line);animation:slideIn .4s}
.ph-bitem .nm{display:flex;gap:6px;align-items:center}.ph-bitem .pr{font-family:'JetBrains Mono',monospace;color:var(--cyan)}
.ph-empty{text-align:center;color:var(--muted);font-size:.6rem;margin-top:34px}
.ph-total{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);display:flex;justify-content:space-between;font-weight:900;font-size:.82rem}
.ph-total .v{color:var(--cyan);font-family:'JetBrains Mono',monospace}
.ph-notif{position:absolute;top:30px;left:9px;right:9px;border-radius:15px;padding:12px;z-index:9;
  background:linear-gradient(135deg,#34d399,#16a06e);color:#04121a;box-shadow:0 16px 34px rgba(0,0,0,.5);
  transform:translateY(-160%);transition:transform .65s cubic-bezier(.3,1.25,.4,1)}
.ph-notif.in{transform:none}
.ph-notif .nt{font-size:.58rem;font-weight:900;display:flex;justify-content:space-between;align-items:center}
.ph-notif .amt{font-size:1.15rem;font-weight:900;margin-top:4px;font-family:'JetBrains Mono',monospace}
.ph-notif .sm{font-size:.5rem;opacity:.82;margin-top:2px}
.ph-receipt{margin-top:78px;display:flex;flex-direction:column;flex:1}
@keyframes slideIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}

/* access-granted banner in scene */
.access{position:absolute;top:13%;left:50%;transform:translate(-50%,-10px);z-index:12;opacity:0;transition:.5s;
  background:rgba(52,211,153,.16);border:1px solid rgba(52,211,153,.5);color:var(--green);
  padding:10px 20px;border-radius:13px;font-weight:800;font-size:.82rem;backdrop-filter:blur(10px);
  box-shadow:0 14px 34px rgba(0,0,0,.4)}
.access.on{opacity:1;transform:translate(-50%,0)}

/* live basket HUD */
.basket{position:absolute;top:84px;right:24px;width:240px;z-index:15;opacity:0;transform:translateX(18px) scale(.97);
  transition:.45s cubic-bezier(.2,1,.3,1);
  background:linear-gradient(160deg,rgba(22,29,51,.85),rgba(12,16,28,.82));backdrop-filter:blur(16px);
  border:1px solid rgba(34,211,238,.22);border-radius:16px;padding:15px 16px;
  box-shadow:0 22px 52px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.06)}
.basket.show{opacity:1;transform:none}
.basket h4{font-size:.58rem;letter-spacing:1.5px;color:var(--muted);font-weight:800;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.basket h4 .cnt{color:#04121a;background:var(--cyan);padding:1px 9px;border-radius:99px;font-size:.62rem}
.basket .live{font-size:.5rem;color:var(--green);display:flex;align-items:center;gap:5px;font-weight:700}
.basket .live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 1.4s infinite}
.bitem{display:flex;justify-content:space-between;align-items:center;font-size:.74rem;padding:9px 0;border-bottom:1px solid var(--line);animation:slideIn .4s}
.bitem .nm{color:var(--text);display:flex;gap:7px;align-items:center}.bitem .pr{font-family:'JetBrains Mono',monospace;color:var(--muted)}
.btotal{display:flex;justify-content:space-between;margin-top:12px;font-weight:900;font-size:.95rem}
.btotal .v{font-family:'JetBrains Mono',monospace;color:var(--cyan)}

/* ===== CHANNELS — interactive 3D ===== */
.ch-scene{width:min(1000px,95vw);display:flex;flex-direction:column;align-items:center;gap:20px}
.ch-cards{display:flex;gap:20px;justify-content:center;perspective:1300px}
.ch-card{position:relative;width:214px;padding:22px 20px;border-radius:20px;cursor:pointer;text-align:center;
  background:linear-gradient(165deg,rgba(28,37,64,.92),rgba(12,16,28,.88));border:1px solid var(--line);
  transform-style:preserve-3d;transition:.55s cubic-bezier(.2,1,.3,1);box-shadow:0 26px 50px rgba(0,0,0,.5)}
.ch-card:nth-child(1){transform:rotateY(15deg) translateZ(-18px)}
.ch-card:nth-child(2){transform:translateZ(12px)}
.ch-card:nth-child(3){transform:rotateY(-15deg) translateZ(-18px)}
.ch-cards.has-sel .ch-card{opacity:.4;filter:saturate(.65) blur(.4px)}
.ch-card:hover{transform:translateY(-8px) rotateY(0) translateZ(28px)}
.ch-card.sel{opacity:1;filter:none;transform:translateY(-14px) rotateY(0) translateZ(44px) scale(1.05);
  border-color:rgba(34,211,238,.6);box-shadow:0 38px 72px rgba(0,0,0,.6),0 0 0 1px rgba(34,211,238,.45)}
.ch-card .ch-ic{width:60px;height:60px;border-radius:17px;display:grid;place-items:center;font-size:2rem;margin:0 auto 14px;
  background:var(--card2);border:1px solid var(--line)}
.ch-card .ch-tag{font-size:.55rem;letter-spacing:2px;font-weight:800;color:var(--cyan);margin-bottom:6px}
.ch-card h3{font-size:1.1rem;font-weight:900;margin-bottom:7px}
.ch-card p{font-size:.74rem;color:var(--muted);line-height:1.5}
.ch-card .ch-go{margin-top:14px;font-size:.6rem;font-weight:800;color:var(--cyan);display:inline-flex;align-items:center;gap:6px}
.ch-card.violet .ch-ic,.ch-card.violet .ch-tag,.ch-card.violet .ch-go{color:#a78bfa}
.ch-card.violet.sel{border-color:rgba(139,92,246,.6);box-shadow:0 38px 72px rgba(0,0,0,.6),0 0 0 1px rgba(139,92,246,.5)}
.ch-card.green .ch-ic,.ch-card.green .ch-tag,.ch-card.green .ch-go{color:#34d399}
.ch-card.green.sel{border-color:rgba(52,211,153,.6);box-shadow:0 38px 72px rgba(0,0,0,.6),0 0 0 1px rgba(52,211,153,.5)}
.ch-card.cyan .ch-ic,.ch-card.cyan .ch-tag,.ch-card.cyan .ch-go{color:#22d3ee}
.ch-detail{width:min(840px,95vw);min-height:206px}
.ch-prompt{text-align:center;color:var(--muted);font-size:.86rem;padding:46px 0;border:1px dashed var(--line);border-radius:18px}
.ch-prompt b{color:var(--cyan)}
.chd-wrap{display:grid;grid-template-columns:1fr 190px;gap:26px;align-items:center;
  background:linear-gradient(160deg,rgba(22,29,51,.72),rgba(12,16,28,.72));border:1px solid var(--line);
  border-radius:20px;padding:22px 26px;animation:fadeUp .5s;box-shadow:0 24px 50px rgba(0,0,0,.4)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.chd-head{grid-column:1/-1;display:flex;align-items:center;gap:12px;margin-bottom:2px}
.chd-head .hic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:1.4rem;background:var(--card2);border:1px solid var(--line)}
.chd-head .ht{font-size:1.05rem;font-weight:900}.chd-head .hs{font-size:.7rem;color:var(--muted)}
.chd-flow{display:flex;flex-direction:column;gap:11px}
.chd-step{display:flex;align-items:center;gap:13px;opacity:.34;transform:translateX(-6px);transition:.45s}
.chd-step.on{opacity:1;transform:none}
.chd-step .si{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-weight:900;font-size:.78rem;
  background:var(--card2);border:1px solid var(--line);color:var(--muted);transition:.3s}
.chd-step.on .si{background:var(--grad);color:#04121a;border-color:transparent}
.chd-step .st{font-size:.84rem;font-weight:700}
/* device column */
.chd-device{display:grid;place-items:center}
.mphone{width:164px;height:330px;position:relative}
.mphone .mframe{position:absolute;inset:0;border-radius:30px;padding:6px;background:linear-gradient(155deg,#3c4456,#11151f);
  box-shadow:0 26px 52px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.08),0 0 0 1.5px #05070d}
.mphone .island{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:42px;height:12px;border-radius:99px;background:#000;z-index:5}
.mphone .mscreen{position:absolute;inset:6px;border-radius:25px;overflow:hidden;background:#070b14;
  background-image:radial-gradient(circle at 50% -10%,rgba(34,211,238,.14),transparent 55%);padding:28px 12px 12px;color:#e8edf7;display:flex;flex-direction:column}
.mph-brand{font-size:.66rem;font-weight:900;text-align:center}.mph-brand .ai{color:var(--cyan)}
.mph-sub{font-size:.55rem;color:var(--muted);text-align:center;margin:2px 0 8px}
.dmap{height:54px;border-radius:12px;margin-bottom:10px;position:relative;overflow:hidden;
  background:linear-gradient(160deg,#11203a,#0b1426);border:1px solid var(--line);
  background-image:repeating-linear-gradient(90deg,transparent,transparent 14px,rgba(34,211,238,.08) 14px,rgba(34,211,238,.08) 15px)}
.dmap .route{position:absolute;left:8%;right:8%;top:55%;height:2px;background:linear-gradient(90deg,var(--green),rgba(52,211,153,.2));border-radius:2px}
.dmap .courier{position:absolute;top:36%;left:6%;font-size:1.1rem;transition:left 1.2s ease}
.dmap .pin{position:absolute;top:30%;right:7%;font-size:.9rem}
.dtrack{display:flex;flex-direction:column}
.dnode{display:flex;gap:10px;align-items:flex-start;position:relative}
.dnode .dn-ic{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-size:.62rem;z-index:2;
  background:var(--card2);border:1px solid var(--line);color:var(--muted);transition:.35s}
.dnode.on .dn-ic{background:var(--green);color:#04121a;border-color:transparent;box-shadow:0 0 12px rgba(52,211,153,.5)}
.dnode .dn-line{position:absolute;left:10px;top:22px;width:2px;height:20px;background:var(--line);z-index:1;transition:.35s}
.dnode.on .dn-line{background:var(--green)}
.dnode:last-child .dn-line{display:none}
.dnode .dn-t{font-size:.6rem;font-weight:700;padding-bottom:22px}
.dnode .dn-t .sm{display:block;font-size:.5rem;color:var(--muted);font-weight:400}
.mnotif{margin-top:auto;border-radius:13px;padding:10px;background:linear-gradient(135deg,#34d399,#16a06e);color:#04121a;
  transform:translateY(140%);opacity:0;transition:.55s cubic-bezier(.3,1.2,.4,1);box-shadow:0 12px 26px rgba(0,0,0,.45)}
.mnotif.in{transform:none;opacity:1}
.mnotif b{font-size:.6rem}.mnotif .amt{font-size:1rem;font-weight:900;font-family:'JetBrains Mono',monospace;margin-top:2px}
.mnotif .sm{font-size:.48rem;opacity:.82}
.mreceipt{flex:1;overflow:auto;margin-top:4px}
.mritem{display:flex;justify-content:space-between;font-size:.58rem;padding:6px 0;border-bottom:1px solid var(--line)}
.mritem .pr{font-family:'JetBrains Mono',monospace;color:var(--cyan)}
/* POS terminal (channel A2) */
.pos{width:150px;height:210px;position:relative;display:flex;flex-direction:column;align-items:center}
.pos .term{width:120px;height:150px;border-radius:16px;background:linear-gradient(160deg,#2a3450,#0f1626);
  border:1px solid var(--line);box-shadow:0 20px 40px rgba(0,0,0,.55);position:relative;padding:12px}
.pos .term .pscr{height:54px;border-radius:8px;background:#0a1322;border:1px solid var(--line);display:grid;place-items:center;
  font-size:.56rem;color:var(--muted);text-align:center;padding:4px}
.pos .term .pscr.ok{color:var(--green);border-color:rgba(52,211,153,.4);background:rgba(52,211,153,.08);font-weight:800}
.pos .term .slot{position:absolute;bottom:14px;left:14px;right:14px;height:6px;border-radius:3px;background:#050a14;border:1px solid var(--cyan)}
.pos .term .reader{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);font-size:1.1rem;opacity:.5}
.pos .card{position:absolute;top:8px;left:50%;transform:translateX(-50%) translateY(-120%) rotate(-8deg);width:74px;height:46px;border-radius:8px;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);box-shadow:0 8px 18px rgba(0,0,0,.5);transition:transform .7s cubic-bezier(.4,0,.2,1)}
.pos .card::before{content:'';position:absolute;top:10px;left:10px;width:14px;height:11px;border-radius:3px;background:rgba(251,191,36,.9)}
.pos.tapped .card{transform:translateX(-50%) translateY(96px) rotate(0)}
.pos .plabel{margin-top:12px;font-size:.56rem;color:var(--muted);text-align:center}

/* ===== ENGINE — epic core (Act 3 opener) ===== */
.engine{position:absolute;inset:0;overflow:hidden;perspective:1200px;perspective-origin:50% 50%;
  background:radial-gradient(circle at 50% 48%,#123251 0%,#0a1730 38%,#05080f 80%)}
.eng-bigword{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:0;pointer-events:none;
  font-size:clamp(5rem,21vw,17rem);font-weight:900;letter-spacing:-6px;white-space:nowrap;
  color:transparent;-webkit-text-stroke:1.5px rgba(34,211,238,.09);text-stroke:1.5px rgba(34,211,238,.09)}
.eng-grid{position:absolute;left:-30%;right:-30%;bottom:-12%;height:72%;transform:perspective(520px) rotateX(72deg);transform-origin:bottom;
  opacity:.5;mask-image:linear-gradient(to top,#000,transparent 85%);-webkit-mask-image:linear-gradient(to top,#000,transparent 85%);
  background:repeating-linear-gradient(90deg,transparent,transparent 48px,rgba(34,211,238,.12) 48px,rgba(34,211,238,.12) 50px),
             repeating-linear-gradient(0deg,transparent,transparent 48px,rgba(34,211,238,.10) 48px,rgba(34,211,238,.10) 50px)}
.eng-tunnel{position:absolute;left:50%;top:50%;width:0;height:0;z-index:1}
.eng-tunnel .tr{position:absolute;left:0;top:0;width:150px;height:150px;margin:-75px;border-radius:50%;
  border:1.5px solid rgba(34,211,238,.5);box-shadow:0 0 22px rgba(34,211,238,.25);animation:warpRing 4.6s linear infinite}
@keyframes warpRing{0%{transform:scale(.06);opacity:0}16%{opacity:.85}100%{transform:scale(7.5);opacity:0}}
.eng-links{position:absolute;inset:0;z-index:2;pointer-events:none}
.eng-links line{stroke:rgba(34,211,238,.4);stroke-width:1.5;stroke-dasharray:5 7;animation:flow 1.1s linear infinite}
@keyframes flow{to{stroke-dashoffset:-24}}
.eng-mods{position:absolute;inset:0;z-index:3;pointer-events:none}
.eng-mod{position:absolute;transform:translate(-50%,-50%);padding:9px 15px;border-radius:12px;white-space:nowrap;
  background:linear-gradient(160deg,rgba(22,29,51,.92),rgba(12,16,28,.86));border:1px solid rgba(34,211,238,.45);
  font-size:.66rem;font-weight:800;letter-spacing:.6px;color:#dff6fb;box-shadow:0 12px 30px rgba(0,0,0,.55),0 0 18px rgba(34,211,238,.15);
  backdrop-filter:blur(6px);opacity:0;animation:modIn .6s ease forwards}
.eng-mod .mi{margin-inline-end:7px}
@keyframes modIn{from{opacity:0;transform:translate(-50%,-30%)}to{opacity:1;transform:translate(-50%,-50%)}}
.eng-core-wrap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:4;transform-style:preserve-3d}
.eng-core{position:relative;width:300px;height:300px;transform-style:preserve-3d;animation:coreIn 1.1s cubic-bezier(.2,1,.3,1)}
@keyframes coreIn{from{transform:scale(.4) rotate(-25deg);opacity:0}to{transform:none;opacity:1}}
.gyro{position:absolute;border-radius:50%;border:2px solid;transform-style:preserve-3d}
.gyro.g1{inset:0;border-color:rgba(34,211,238,.75);box-shadow:0 0 26px rgba(34,211,238,.45),inset 0 0 26px rgba(34,211,238,.2);animation:spinGX 7s linear infinite}
.gyro.g2{inset:30px;border-color:rgba(59,130,246,.75);box-shadow:0 0 18px rgba(59,130,246,.3);animation:spinGY 5.5s linear infinite}
.gyro.g3{inset:60px;border-color:rgba(139,92,246,.8);box-shadow:0 0 18px rgba(139,92,246,.35);animation:spinGXY 9s linear infinite}
@keyframes spinGX{to{transform:rotateX(360deg)}}
@keyframes spinGY{to{transform:rotateY(360deg)}}
@keyframes spinGXY{to{transform:rotateX(360deg) rotateZ(360deg)}}
.eng-orb{position:absolute;inset:104px;border-radius:50%;z-index:2;
  background:radial-gradient(circle at 38% 32%,#eafcff,#34d3ee 38%,#3b82f6 70%,#1a2c66);
  box-shadow:0 0 70px rgba(34,211,238,.8),0 0 150px rgba(59,130,246,.5),inset 0 0 40px rgba(255,255,255,.5);
  animation:orbPulse 2.6s ease-in-out infinite}
@keyframes orbPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07);
  box-shadow:0 0 110px rgba(139,92,246,.9),0 0 170px rgba(34,211,238,.5),inset 0 0 52px rgba(255,255,255,.6)}}
.eng-orb::after{content:'';position:absolute;inset:-7px;border-radius:50%;border:1px solid rgba(255,255,255,.4)}
.eng-core-lbl{position:absolute;left:50%;top:calc(50% + 180px);transform:translateX(-50%);text-align:center;z-index:5;white-space:nowrap}
.eng-core-lbl .t{font-size:.72rem;letter-spacing:6px;font-weight:900;color:#fff;text-shadow:0 0 16px rgba(34,211,238,.7)}
.eng-core-lbl .s{font-size:.55rem;letter-spacing:3px;color:#22d3ee;margin-top:5px}
.eng-charge{position:absolute;left:50%;top:50%;width:30px;height:30px;margin:-15px;border-radius:50%;background:#fff;z-index:8;opacity:0;pointer-events:none}
.eng-charge.go{animation:chargeFlash 1.1s ease-out}
@keyframes chargeFlash{0%{opacity:0;transform:scale(.2)}28%{opacity:.95}100%{opacity:0;transform:scale(46)}}
.eng-scan{position:absolute;inset:0;z-index:6;pointer-events:none;opacity:.35;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.25) 3px,rgba(0,0,0,.25) 4px)}
.eng-vignette{position:absolute;inset:0;z-index:7;pointer-events:none;box-shadow:inset 0 0 250px rgba(5,8,15,.92)}

/* ===== WIREFRAME / XRAY ===== */
.xray{width:min(900px,90vw);aspect-ratio:16/10;position:relative;
  background:radial-gradient(ellipse at 50% 30%,rgba(28,37,64,.4),rgba(10,14,26,.7));
  border:1px solid var(--line);border-radius:20px;overflow:hidden}
.xray svg{position:absolute;inset:0;width:100%;height:100%}
.person{position:absolute;width:40px;transition:left 2.4s linear,top 2.4s linear}
.person .box{position:absolute;inset:-8px -6px;border:1.5px solid var(--cyan);border-radius:4px}
.person .pid{position:absolute;top:-22px;left:-6px;font-family:'JetBrains Mono',monospace;font-size:.52rem;
  color:var(--cyan);white-space:nowrap;background:rgba(10,14,26,.7);padding:1px 4px;border-radius:3px}
.person.reid .box{border-style:dotted;opacity:.5}
.person.suspect .box{border-color:var(--red);box-shadow:0 0 14px var(--red)}
.person.suspect .pid{color:var(--red)}
.alert-cascade{position:absolute;left:18px;bottom:18px;font-family:'JetBrains Mono',monospace;font-size:.66rem;
  line-height:1.9;color:var(--muted)}
.alert-cascade div{opacity:.25;transition:.4s}
.alert-cascade div.done{opacity:1;color:var(--green)}
.alert-overlay{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,transparent 40%,rgba(248,113,113,.18));
  opacity:0;transition:.5s;pointer-events:none}
.alert-overlay.on{opacity:1;animation:redpulse 1.4s ease-in-out infinite}
@keyframes redpulse{0%,100%{opacity:.55}50%{opacity:1}}
.perc-panel{position:absolute;left:16px;top:16px;font-family:'JetBrains Mono',monospace;font-size:.6rem;
  line-height:1.8;color:var(--muted);background:rgba(10,14,26,.5);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.perc-panel .h{color:var(--cyan);font-weight:700;margin-bottom:5px}

/* ===== VISION — world-class 3D AI perception (Steps 17–18) ===== */
.vision{position:absolute;inset:0;overflow:hidden;perspective:1300px;perspective-origin:50% 36%;
  background:radial-gradient(ellipse at 50% 42%,#0d1f3a 0%,#0a1426 44%,#05080f 84%)}
.vis-bigword{position:absolute;left:50%;top:26%;transform:translate(-50%,-50%);z-index:0;pointer-events:none;
  font-size:clamp(4rem,17vw,14rem);font-weight:900;letter-spacing:-5px;white-space:nowrap;
  color:transparent;-webkit-text-stroke:1.5px rgba(34,211,238,.08);text-stroke:1.5px rgba(34,211,238,.08)}
.vis-floor{position:absolute;left:-35%;right:-35%;bottom:-8%;height:66%;z-index:1;transform:perspective(660px) rotateX(70deg);transform-origin:bottom;
  background:repeating-linear-gradient(90deg,transparent,transparent 52px,rgba(34,211,238,.14) 52px,rgba(34,211,238,.14) 54px),
             repeating-linear-gradient(0deg,transparent,transparent 52px,rgba(34,211,238,.10) 52px,rgba(34,211,238,.10) 54px);
  -webkit-mask-image:radial-gradient(ellipse at 50% 100%,#000 28%,transparent 78%);
  mask-image:radial-gradient(ellipse at 50% 100%,#000 28%,transparent 78%)}
.vis-floor::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 100%,rgba(34,211,238,.16),transparent 56%)}
.vis-shelf{position:absolute;z-index:2;border:1px solid rgba(34,211,238,.35);border-radius:4px;
  background:linear-gradient(180deg,rgba(34,211,238,.07),transparent);box-shadow:inset 0 0 18px rgba(34,211,238,.12)}
.vis-shelf .pbox{position:absolute;width:14px;height:11px;border:1px solid rgba(34,211,238,.5);border-radius:2px}
.vis-shelf .plabel{position:absolute;top:-15px;left:-2px;font-family:'JetBrains Mono',monospace;font-size:.46rem;color:var(--cyan);white-space:nowrap}
.vis-scan{position:absolute;left:0;right:0;height:130px;z-index:3;pointer-events:none;
  background:linear-gradient(180deg,transparent,rgba(34,211,238,.10) 44%,rgba(34,211,238,.55) 50%,rgba(34,211,238,.10) 56%,transparent);
  animation:visScan 3.4s ease-in-out infinite}
@keyframes visScan{0%{top:-14%}100%{top:90%}}
.vis-fig{position:absolute;z-index:5;transform:translateX(-50%) scale(var(--s,1));transform-origin:bottom center;
  transition:left 2.6s linear, top 2.6s linear, transform .6s}
.vis-fig .ground{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:62px;height:17px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(34,211,238,.55),transparent 70%);transition:.5s}
.vis-fig .figbody{filter:drop-shadow(0 0 9px rgba(34,211,238,.75));transition:filter .5s}
.vis-fig .bbox{position:absolute;inset:-12px -20px -6px;border:1.5px solid rgba(34,211,238,.55);border-radius:5px;transition:.4s}
.vis-fig .bbox span{position:absolute;width:11px;height:11px;border:2px solid var(--cyan)}
.vis-fig .bbox .tl{top:-2px;left:-2px;border-right:none;border-bottom:none}
.vis-fig .bbox .tr{top:-2px;right:-2px;border-left:none;border-bottom:none}
.vis-fig .bbox .bl{bottom:-2px;left:-2px;border-right:none;border-top:none}
.vis-fig .bbox .br{bottom:-2px;right:-2px;border-left:none;border-top:none}
.vis-fig .tag{position:absolute;top:-30px;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'JetBrains Mono',monospace;
  font-size:.56rem;color:var(--cyan);background:rgba(10,14,26,.82);border:1px solid rgba(34,211,238,.45);padding:2px 8px;border-radius:6px;transition:.4s}
.vis-fig.reid .bbox{border-style:dashed;opacity:.5} .vis-fig.reid .tag{opacity:.55}
.vis-fig.suspect .bbox{border-color:rgba(248,113,113,.85);box-shadow:0 0 18px rgba(248,113,113,.45)}
.vis-fig.suspect .bbox span{border-color:var(--red)}
.vis-fig.suspect .tag{color:var(--red);border-color:rgba(248,113,113,.5)}
.vis-fig.suspect .figbody{filter:drop-shadow(0 0 11px rgba(248,113,113,.8))}
.vis-fig.suspect .ground{background:radial-gradient(ellipse,rgba(248,113,113,.55),transparent 70%)}
.vis-gesture{position:absolute;top:-6px;left:50%;width:70px;height:70px;opacity:0;transition:.4s}
.vis-fig.flag .vis-gesture{opacity:1}
.vis-gesture path{fill:none;stroke:var(--amber);stroke-width:2;stroke-dasharray:60;stroke-dashoffset:60;
  filter:drop-shadow(0 0 4px var(--amber))}
.vis-fig.flag .vis-gesture path{animation:visDraw 1s ease forwards}
@keyframes visDraw{to{stroke-dashoffset:0}}
.vis-ring{position:absolute;z-index:4;width:96px;height:32px;border-radius:50%;border:2px solid rgba(248,113,113,.75);
  box-shadow:0 0 22px rgba(248,113,113,.5),inset 0 0 14px rgba(248,113,113,.3);opacity:0;transition:.5s;transform:translateX(-50%)}
.vis-ring.on{opacity:1;animation:ringP 1.5s ease-in-out infinite}
@keyframes ringP{0%,100%{transform:translateX(-50%) scale(1);opacity:.7}50%{transform:translateX(-50%) scale(1.08);opacity:1}}
.vis-alert{position:absolute;inset:0;z-index:6;pointer-events:none;opacity:0;transition:.6s;
  background:radial-gradient(ellipse at 50% 56%,transparent 34%,rgba(216,78,78,.16) 82%)}
.vis-alert.on{opacity:1;animation:visRed 2.1s ease-in-out infinite}
@keyframes visRed{0%,100%{opacity:.65}50%{opacity:1}}
.vis-alert-bar{position:absolute;top:18px;left:50%;transform:translate(-50%,-12px);z-index:8;opacity:0;transition:.45s;
  background:rgba(248,113,113,.14);border:1px solid rgba(248,113,113,.55);color:var(--red);font-weight:800;font-size:.74rem;
  letter-spacing:1px;padding:8px 18px;border-radius:12px;backdrop-filter:blur(8px)}
.vis-alert-bar.on{opacity:1;transform:translate(-50%,0)}
.vis-hud{position:absolute;top:20px;left:20px;z-index:7;width:236px;background:rgba(8,12,22,.62);backdrop-filter:blur(12px);
  border:1px solid var(--line);border-radius:15px;padding:15px 16px;box-shadow:0 18px 40px rgba(0,0,0,.45)}
.vis-hud .hh{font-size:.58rem;letter-spacing:1.5px;color:var(--cyan);font-weight:800;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.vis-hud .hh .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.4s infinite}
.vis-mod{margin-bottom:11px}
.vis-mod .mr{display:flex;justify-content:space-between;font-size:.58rem;font-weight:700;margin-bottom:4px}
.vis-mod .mr .v{font-family:'JetBrains Mono',monospace;color:var(--cyan)}
.vis-mod .bar{height:5px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden}
.vis-mod .bar i{display:block;height:100%;width:0;background:var(--grad);border-radius:99px;transition:width 1.1s ease}
.vis-cascade{position:absolute;right:20px;bottom:20px;z-index:7;width:290px;font-family:'JetBrains Mono',monospace;font-size:.6rem;line-height:1.6;
  background:rgba(8,12,22,.62);backdrop-filter:blur(12px);border:1px solid rgba(248,113,113,.3);border-radius:13px;padding:14px 15px;
  opacity:0;transform:translateY(12px);transition:.45s}
.vis-cascade.on{opacity:1;transform:none}
.vis-cascade .ct{color:var(--red);font-weight:800;margin-bottom:9px;letter-spacing:1px;font-family:'Inter',sans-serif;font-size:.66rem}
.vis-cascade .cs{opacity:.3;transition:.4s;display:flex;gap:8px;padding:4px 0}
.vis-cascade .cs.done{opacity:1;color:var(--green)}
.vis-cascade .cs .ix{color:var(--muted)}
.vis-cascade .resolved{margin-top:9px;padding-top:9px;border-top:1px solid var(--line);color:var(--green);font-weight:800;
  font-family:'Inter',sans-serif;font-size:.66rem;opacity:0;transition:.5s}
.vis-cascade .resolved.on{opacity:1}
.vis-vignette{position:absolute;inset:0;z-index:9;pointer-events:none;box-shadow:inset 0 0 230px rgba(5,8,15,.85)}

/* ===== WIFI GRID ===== */
.wifi-grid{position:absolute;inset:8% 6%;display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(4,1fr);gap:8px}
.sector{border:1px solid rgba(139,92,246,.2);border-radius:7px;position:relative;transition:.4s;
  background:rgba(139,92,246,.03)}
.sector.active{background:rgba(34,211,238,.12);border-color:var(--cyan);box-shadow:inset 0 0 22px rgba(34,211,238,.25)}
.sector .cam{position:absolute;top:5px;right:6px;font-size:.62rem;opacity:.35;transition:.4s}
.sector .cam .z{color:var(--muted)}
.sector.active .cam{opacity:1}
.sector.active .cam .z{display:none}
.sector .camdot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#555;transition:.3s}
.sector.active .camdot{background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.wifi-node{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--violet);box-shadow:0 0 10px var(--violet)}
.ripple{position:absolute;border:1.5px solid rgba(139,92,246,.5);border-radius:50%;
  animation:ripple 3s ease-out infinite;pointer-events:none}
@keyframes ripple{0%{width:0;height:0;opacity:.8;transform:translate(-50%,-50%)}100%{width:480px;height:480px;opacity:0;transform:translate(-50%,-50%)}}
.walker{position:absolute;width:26px;height:26px;border-radius:50%;background:radial-gradient(circle,var(--cyan),transparent);
  border:1.5px solid var(--cyan);box-shadow:0 0 16px var(--cyan);z-index:4;transition:left 2.6s linear,top 2.6s linear}
.wifi-counter{position:absolute;top:14px;left:16px;font-family:'JetBrains Mono',monospace;font-size:.62rem;
  color:var(--muted);line-height:1.7;background:rgba(10,14,26,.55);border:1px solid var(--line);padding:9px 12px;border-radius:10px}
.wifi-counter b{color:var(--cyan)}

/* ===== SOLAR — epic off-grid showcase (Act-3) ===== */
.solar2{position:absolute;inset:0;overflow:hidden;
  background:linear-gradient(180deg,#0a1f3a 0%,#1c3e64 28%,#4a6a88 50%,#c79a58 74%,#e8b06a 86%,#2a1d14 100%)}
.sol-night{position:absolute;inset:0;opacity:0;transition:opacity 1.6s;
  background:linear-gradient(180deg,#04070e 0%,#0a1428 45%,#0e1830 72%,#06090f 100%)}
.sol-stars{position:absolute;inset:0;opacity:0;transition:opacity 1.6s}
.sol-stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff}
.sol-sun{position:absolute;width:92px;height:92px;border-radius:50%;transform:translate(-50%,-50%);z-index:1;
  background:radial-gradient(circle,#fff 8%,#ffe9b0 38%,#f0a040 72%,transparent 80%);
  box-shadow:0 0 90px 34px rgba(251,191,36,.5),0 0 170px 70px rgba(240,134,58,.28)}
.sol-sun::after{content:'';position:absolute;inset:-34%;border-radius:50%;opacity:.55;
  background:repeating-conic-gradient(from 0deg,rgba(255,221,150,.45) 0deg 3deg,transparent 3deg 15deg);
  animation:spin 30s linear infinite}
.sol-bigword{position:absolute;left:50%;top:27%;transform:translate(-50%,-50%);z-index:2;pointer-events:none;
  font-size:clamp(4rem,16vw,13rem);font-weight:900;letter-spacing:-5px;white-space:nowrap;
  color:transparent;-webkit-text-stroke:1.5px rgba(255,255,255,.08);text-stroke:1.5px rgba(255,255,255,.08)}
.sol-iso{position:absolute;inset:0;width:100%;height:100%;z-index:3}
.sol-flow-a{stroke:rgba(251,191,36,.9);stroke-width:2.6;stroke-dasharray:5 8;stroke-linecap:round;
  animation:flow 1.05s linear infinite;filter:drop-shadow(0 0 4px rgba(251,191,36,.7))}
.sol-flow-c{stroke:rgba(34,211,238,.9);stroke-width:2.6;stroke-dasharray:5 8;stroke-linecap:round;
  animation:flow 1.05s linear infinite;filter:drop-shadow(0 0 4px rgba(34,211,238,.6))}
.sol-hud{position:absolute;top:18px;right:18px;z-index:6;display:flex;gap:9px;flex-wrap:wrap;max-width:280px;justify-content:flex-end}
.sol-stat{background:rgba(10,14,26,.62);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:12px;padding:9px 13px;min-width:80px}
.sol-stat .v{font-family:'JetBrains Mono',monospace;font-weight:900;font-size:1.02rem;color:var(--amber)}
.sol-stat.green .v{color:var(--green)} .sol-stat.cyan .v{color:var(--cyan)}
.sol-stat .l{font-size:.5rem;letter-spacing:1px;color:var(--muted);font-weight:700;margin-top:2px}
.sol-grid-badge{position:absolute;left:20px;top:32%;z-index:6;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.5);
  border-radius:14px;padding:12px 16px;backdrop-filter:blur(8px);max-width:196px;box-shadow:0 16px 36px rgba(0,0,0,.4)}
.sol-grid-badge .t{font-size:.76rem;font-weight:900;color:var(--red);display:flex;align-items:center;gap:7px}
.sol-grid-badge .s{font-size:.58rem;color:var(--muted);margin-top:5px;line-height:1.5}
.sol-grid-badge .big{font-size:.92rem;font-weight:900;color:var(--green);margin-top:9px;letter-spacing:.5px}
.sol-daynight{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:6;
  font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:700;color:#fff;white-space:nowrap;
  background:rgba(10,14,26,.55);border:1px solid var(--line);padding:8px 16px;border-radius:11px;backdrop-filter:blur(8px)}
.sol-vignette{position:absolute;inset:0;z-index:5;pointer-events:none;box-shadow:inset 0 0 230px rgba(5,8,15,.7)}

/* ===== DASHBOARD ===== */
.dash{width:min(940px,92vw);display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:minmax(70px,auto);gap:12px}
.dpanel{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:14px;padding:14px}
.dpanel .dt{font-size:.6rem;letter-spacing:1.5px;color:var(--muted);font-weight:800;margin-bottom:8px}
.dpanel .dv{font-size:1.5rem;font-weight:900;font-family:'JetBrains Mono',monospace}
.dpanel.wide{grid-column:span 2}.dpanel.tall{grid-row:span 2}
.dpanel .spark{display:flex;align-items:flex-end;gap:3px;height:42px;margin-top:6px}
.dpanel .spark i{flex:1;background:var(--grad);border-radius:2px 2px 0 0;opacity:.8}
.heatmap{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;margin-top:6px}
.heatmap i{aspect-ratio:1;border-radius:2px}
.notif{grid-column:span 4;display:flex;align-items:center;gap:10px;background:rgba(34,211,238,.08);
  border:1px solid rgba(34,211,238,.3);border-radius:12px;padding:12px 16px;font-size:.82rem;font-weight:700;color:var(--cyan)}

/* ===== ROBOT — cinematic warehouse + articulated AMR ===== */
.warehouse{width:min(980px,94vw);aspect-ratio:16/9;position:relative;overflow:hidden;border-radius:22px;
  border:1px solid var(--line);background:radial-gradient(ellipse at 50% 16%,#16223f 0%,#0c1322 46%,#070a14 100%);
  box-shadow:inset 0 0 140px rgba(0,0,0,.65)}
.wh-shaft{position:absolute;top:-12%;width:130px;height:96%;mix-blend-mode:screen;filter:blur(7px);transform:skewX(-13deg);
  background:linear-gradient(180deg,rgba(186,210,255,.16),rgba(186,210,255,.04) 55%,transparent 78%)}
.wh-floor{position:absolute;left:-25%;right:-25%;bottom:0;height:42%;transform:perspective(620px) rotateX(66deg);transform-origin:bottom;
  background:
    repeating-linear-gradient(90deg,transparent,transparent 56px,rgba(34,211,238,.13) 56px,rgba(34,211,238,.13) 58px),
    repeating-linear-gradient(0deg,transparent,transparent 56px,rgba(34,211,238,.10) 56px,rgba(34,211,238,.10) 58px),
    linear-gradient(180deg,rgba(34,211,238,.05),transparent)}
.wh-floor::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 120%,rgba(34,211,238,.14),transparent 55%)}
.wh-rack{position:absolute;top:11%;height:54%;width:148px;display:flex;flex-direction:column;gap:7px;padding:7px;border-radius:7px;
  background:linear-gradient(180deg,#18203a,#0c1222);border:1px solid var(--line);box-shadow:0 30px 50px rgba(0,0,0,.5)}
.wh-rack.l{left:2.5%;transform:perspective(1100px) rotateY(33deg);transform-origin:left center}
.wh-rack.r{right:2.5%;transform:perspective(1100px) rotateY(-33deg);transform-origin:right center}
.wh-rack .lvl{flex:1;display:flex;gap:6px;padding:3px;border-bottom:1px solid rgba(34,211,238,.14)}
.wh-rack .lvl:last-child{border-bottom:none}
.wh-rack .pk{flex:1;border-radius:2px;background:linear-gradient(160deg,#caa15f 0%,#a07a3e 55%,#7c5c2c 100%);
  box-shadow:inset 0 2px 0 rgba(255,255,255,.35),inset 0 -3px 4px rgba(0,0,0,.3)}
.wh-rack .pk.alt{background:linear-gradient(160deg,#4a597e,#2c3654)}
.wh-rack .pk.glow{background:linear-gradient(160deg,#2bd6ee,#1f8fb8);box-shadow:0 0 12px rgba(34,211,238,.6)}
.mote{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(251,231,160,.7);filter:blur(.5px);
  animation:drift 7s ease-in-out infinite}
@keyframes drift{0%,100%{transform:translateY(0);opacity:.25}50%{transform:translateY(-14px);opacity:.85}}
.nav-path{position:absolute;bottom:13%;left:9%;height:4px;border-radius:99px;width:0;transition:width 2.8s ease;
  background:linear-gradient(90deg,rgba(34,211,238,.9),rgba(34,211,238,.05));box-shadow:0 0 12px rgba(34,211,238,.7)}
.dock{position:absolute;bottom:12%;left:2%;width:34px;height:52px;border:2px solid var(--amber);border-radius:7px;
  display:grid;place-items:center;font-size:.5rem;color:var(--amber);text-align:center;font-weight:700;
  box-shadow:0 0 18px rgba(251,191,36,.3),inset 0 0 14px rgba(251,191,36,.15)}
.dispatch{position:absolute;bottom:12%;right:2.5%;width:66px;height:92px;border:2px solid var(--green);border-radius:9px;z-index:2;
  display:grid;place-items:center;font-size:.55rem;color:var(--green);text-align:center;font-weight:700;letter-spacing:1px;
  box-shadow:0 0 18px rgba(52,211,153,.25),inset 0 0 16px rgba(52,211,153,.12)}
/* the AMR */
.amr{position:absolute;bottom:15%;left:9%;width:172px;height:160px;z-index:6;transition:left 3s cubic-bezier(.45,.05,.2,1)}
.amr .fshadow{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:158px;height:26px;
  background:radial-gradient(ellipse,rgba(0,0,0,.6),transparent 68%);filter:blur(5px)}
.amr-bob{position:absolute;inset:0;animation:bob 3.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.amr .base{position:absolute;bottom:18px;left:19px;width:134px;height:44px;border-radius:13px;
  background:linear-gradient(180deg,#f4f7fc 0%,#cdd5e3 38%,#8893ab 78%,#5d6680 100%);
  box-shadow:0 12px 24px rgba(0,0,0,.55),inset 0 2px 0 rgba(255,255,255,.85),inset 0 -7px 14px rgba(0,0,0,.3)}
.amr .base::before{content:'';position:absolute;top:7px;left:12px;right:44px;height:8px;border-radius:6px;
  background:linear-gradient(90deg,rgba(255,255,255,.75),transparent)}
.amr .base .strip{position:absolute;bottom:8px;left:10px;right:10px;height:5px;border-radius:99px;
  background:var(--cyan);box-shadow:0 0 12px var(--cyan)}
.amr .base .badge{position:absolute;bottom:15px;left:13px;font-size:.44rem;font-weight:900;letter-spacing:.5px;color:#0a0e1a}
.amr .base .badge .ai{color:#1f8fb8}
.amr .wheel{position:absolute;bottom:2px;width:30px;height:30px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,#46506c,#15192a 70%);border:2px solid rgba(34,211,238,.35);
  box-shadow:0 4px 8px rgba(0,0,0,.5)}
.amr .wheel::after{content:'';position:absolute;inset:9px;border-radius:50%;background:#222a3f;box-shadow:inset 0 0 4px #000}
.amr .wheel.l{left:32px}.amr .wheel.r{right:32px}
.amr .mast{position:absolute;bottom:54px;left:30px;width:20px;height:32px;border-radius:6px 6px 0 0;
  background:linear-gradient(180deg,#aeb8cc,#697693);box-shadow:inset 0 2px 0 rgba(255,255,255,.5)}
.amr .lidar{position:absolute;bottom:84px;left:24px;width:32px;height:20px;border-radius:50% 50% 42% 42%;overflow:hidden;
  background:radial-gradient(ellipse at 40% 28%,#2bd6ee,#0e3a52);border:1px solid rgba(34,211,238,.6);box-shadow:0 0 16px rgba(34,211,238,.5)}
.amr .lidar::after{content:'';position:absolute;bottom:1px;left:50%;width:2px;height:78%;transform-origin:bottom center;
  background:linear-gradient(180deg,transparent,var(--cyan));animation:sweep 1.8s linear infinite}
@keyframes sweep{from{transform:translateX(-50%) rotate(0)}to{transform:translateX(-50%) rotate(360deg)}}
.amr .bin{position:absolute;bottom:50px;right:24px;width:42px;height:30px;border-radius:3px;
  background:linear-gradient(160deg,#b98e4e,#7c5c2c);border:1px solid #d6ad63;
  box-shadow:inset 0 6px 10px rgba(0,0,0,.4),inset 0 2px 0 rgba(255,255,255,.25)}
.amr .bin .pkg{position:absolute;top:-2px;left:6px;width:30px;height:0;border-radius:2px;transition:height .5s ease;
  background:linear-gradient(160deg,#caa15f,#8a6a35);border:1px solid #d6ad63}
.amr .arm{position:absolute;bottom:84px;left:40px;width:14px;height:14px;z-index:3}
.amr .shoulder,.amr .elbow{position:absolute;width:14px;height:14px;border-radius:50%;border:1px solid var(--cyan);
  background:radial-gradient(circle at 40% 34%,#dfe5f0,#6c7691)}
.amr .shoulder{bottom:0;left:0}
.amr .upper{position:absolute;bottom:6px;left:4px;width:8px;height:46px;border-radius:5px;transform-origin:bottom center;
  background:linear-gradient(180deg,#eef2f9,#8893ab);box-shadow:inset -2px 0 3px rgba(0,0,0,.3);
  transform:rotate(10deg);transition:transform .85s cubic-bezier(.5,0,.2,1)}
.amr .elbow{top:-7px;left:-3px;background:radial-gradient(circle at 40% 34%,#dfe5f0,#6c7691)}
.amr .fore{position:absolute;top:3px;left:4px;width:7px;height:42px;border-radius:5px;transform-origin:top center;
  background:linear-gradient(180deg,#dfe5f0,#7e8aa3);transform:rotate(-16deg);transition:transform .85s cubic-bezier(.5,0,.2,1)}
.amr .wrist{position:absolute;bottom:-6px;left:-3px;width:13px;height:10px;border-radius:3px;background:#26314f;border:1px solid var(--cyan)}
.amr .grip::before,.amr .grip::after{content:'';position:absolute;bottom:-7px;width:3px;height:8px;background:#cdd5e3;border-radius:1px}
.amr .grip::before{left:1px;transform:rotate(9deg)}.amr .grip::after{right:1px;transform:rotate(-9deg)}
.amr .held{position:absolute;bottom:-15px;left:1px;width:11px;height:0;border-radius:2px;transition:height .3s;
  background:linear-gradient(160deg,#caa15f,#8a6a35);border:1px solid #d6ad63}
.amr .printer{position:absolute;bottom:-2px;right:-9px;width:8px;height:9px;border-radius:2px;background:#26314f;border:1px solid var(--cyan)}
.amr .receipt{position:absolute;top:8px;right:-8px;width:6px;height:0;background:#fff;overflow:hidden;transition:height .7s;box-shadow:0 0 5px rgba(255,255,255,.6)}
.amr.reach .upper{transform:rotate(-46deg)} .amr.reach .fore{transform:rotate(54deg)}
.amr.lift .upper{transform:rotate(-8deg)} .amr.lift .fore{transform:rotate(20deg)}

/* ===== DRONE / CITY — cinematic camera pull-up + NURAI fingerprint ===== */
.city-scene{width:100%;height:100%;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#0a0f24 0%,#241537 30%,#7a2f3e 55%,#c2632e 72%,#e89a4a 82%,#3a1d14 100%)}
.stars{position:absolute;inset:0;opacity:0;transition:opacity 2.5s}
.stars.on{opacity:1}
.stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff}
.city-cam{position:absolute;inset:0;transform-origin:50% 100%;transition:transform 4s cubic-bezier(.4,.1,.2,1)}
.citysun{position:absolute;bottom:30%;left:50%;transform:translateX(-50%);width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,#ffe9b0,#f0863a 60%,transparent 72%);box-shadow:0 0 160px 60px rgba(240,134,58,.45);filter:blur(1px)}
.haze{position:absolute;bottom:32%;left:0;right:0;height:18%;background:linear-gradient(180deg,transparent,rgba(240,160,90,.35));filter:blur(8px)}
.layer{position:absolute;bottom:0;left:0;right:0}
.layer.far{height:30%;filter:blur(1.5px);opacity:.6}
.layer.mid{height:38%;opacity:.85}
.layer.near{height:46%}
.bldg{position:absolute;bottom:0;border-top:1px solid rgba(34,211,238,.18);border-radius:2px 2px 0 0}
.layer.far .bldg{background:linear-gradient(180deg,#3a2a4a,#241537)}
.layer.mid .bldg{background:linear-gradient(180deg,#1d1330,#140c22)}
.layer.near .bldg{background:linear-gradient(180deg,#0d0816,#070410)}
.bldg .win{position:absolute;width:3px;height:3px;background:#ffd27a;border-radius:1px;opacity:0;animation:winon .6s forwards}
@keyframes winon{to{opacity:.85}}
.tigris{position:absolute;bottom:0;left:-12%;right:-12%;height:15%;transform:perspective(420px) rotateX(60deg);transform-origin:bottom;
  background:linear-gradient(180deg,rgba(240,134,58,.5),rgba(34,211,238,.12));filter:blur(3px)}
.vignette{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 220px rgba(5,8,15,.85)}
.champ-badge{position:absolute;top:6%;left:50%;transform:translateX(-50%) scale(.86);opacity:0;text-align:center;z-index:5;
  transition:opacity 1.2s cubic-bezier(.2,1,.3,1), transform 1.2s cubic-bezier(.2,1,.3,1)}
.champ-badge.on{opacity:1;transform:translateX(-50%) scale(1)}
.champ-badge .disc{width:210px;height:210px;border-radius:50%;display:grid;place-items:center;margin:0 auto;
  background:radial-gradient(circle at 50% 42%,#ffffff,#e7eefb 78%);border:1px solid rgba(255,255,255,.7);
  box-shadow:0 0 60px rgba(34,211,238,.55),0 24px 60px rgba(0,0,0,.55),inset 0 0 30px rgba(34,211,238,.12)}
.champ-badge .disc img{width:158px;height:auto}
.champ-badge .cap{margin-top:16px;font-size:.6rem;letter-spacing:3px;color:#22d3ee;font-weight:800;white-space:nowrap;
  text-shadow:0 0 14px rgba(34,211,238,.6)}
.drone{position:absolute;top:34%;left:-14%;width:120px;transition:all 5s cubic-bezier(.3,.4,.3,1);z-index:7}
.drone .body{width:60px;height:15px;margin:0 auto;border-radius:9px;position:relative;
  background:linear-gradient(180deg,#3a445f,#1a2030);border:1px solid var(--cyan);box-shadow:0 6px 16px rgba(0,0,0,.5)}
.drone .arm-d{position:absolute;top:6px;width:26px;height:3px;background:#2a3142}
.drone .arm-d.l{left:-22px}.drone .arm-d.r{right:-22px}
.drone .rotor{position:absolute;top:-3px;width:30px;height:5px;border-radius:99px;background:rgba(34,211,238,.5);animation:rspin .12s linear infinite}
.drone .rotor.l{left:-34px}.drone .rotor.r{right:-34px}
@keyframes rspin{50%{transform:scaleX(.18)}}
.drone .nav-ring{position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:34px;height:3px;background:var(--cyan);border-radius:99px;box-shadow:0 0 10px var(--cyan)}
.drone .pkg{width:22px;height:17px;margin:3px auto 0;border-radius:2px;background:linear-gradient(160deg,#caa15f,#8a6a35);border:1px solid #d6ad63}

/* ===== FINANCE ===== */
.finance{width:min(960px,94vw)}
.fin-head{text-align:center;margin-bottom:20px}
.scenario-row{display:flex;gap:16px;align-items:center;justify-content:center;flex-wrap:wrap}
.store-3d{width:160px;height:110px;position:relative;perspective:500px}
.store-3d .box{position:absolute;inset:0;background:linear-gradient(160deg,rgba(232,237,247,.18),rgba(232,237,247,.05));

.store-3d .roof-solar{position:absolute;inset:8px;background:repeating-linear-gradient(45deg,#0d2440,#0d2440 4px,#11305a 4px,#11305a 8px);

.scn-spec span{font-family:'JetBrains Mono',monospace;font-size:.78rem;background:var(--card2);border:1px solid var(--line);

.towers{display:flex;gap:40px;justify-content:center;align-items:flex-end;height:300px;margin-top:10px}
.tower{width:240px;display:flex;flex-direction:column-reverse;gap:3px}

  font-size:.7rem;transform-origin:bottom;animation:growSeg .5s backwards}
@keyframes growSeg{from{transform:scaleY(0);opacity:0}to{transform:scaleY(1);opacity:1}}
.tower .seg .sl{color:var(--text);font-weight:600}.tower .seg .sv{font-family:'JetBrains Mono',monospace;font-weight:800}
.tower.secur .seg{background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.3)}

.tower.secur .thead{background:var(--grad);color:#04121a}
.tower.trad .thead{background:rgba(248,113,113,.2);color:var(--red)}
.tower .ttot{text-align:center;font-family:'JetBrains Mono',monospace;font-weight:900;font-size:1.05rem;margin-top:6px}
.tower.secur .ttot{color:var(--cyan)}.tower.trad .ttot{color:var(--red)}
.chart-wrap{position:relative}
#finChart{width:100%;height:380px;display:block}
.fin-controls{display:flex;gap:24px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.fctl{display:flex;flex-direction:column;gap:5px;font-size:.72rem;color:var(--muted);font-weight:700}
.fctl input{width:200px;accent-color:var(--cyan)}
.fctl .fval{font-family:'JetBrains Mono',monospace;color:var(--cyan)}
.be-badge{position:absolute;background:var(--amber);color:#04121a;font-weight:900;font-size:.8rem;
  padding:6px 12px;border-radius:8px;box-shadow:0 6px 20px rgba(251,191,36,.5);font-family:'JetBrains Mono',monospace;

.be-badge.show{opacity:1}

/* ===== ENDCARD ===== */
.endcard{text-align:center}
.endcard .big{font-size:4rem;font-weight:900;letter-spacing:-1.5px;margin-bottom:6px}
.endcard .big .ai{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.endcard .etag{color:var(--muted);font-size:1.15rem;margin-bottom:28px}

.endcard .elogos{display:flex;gap:36px;justify-content:center;align-items:center;margin-bottom:26px}
.endcard .elogos img{height:80px}
.endcard .elogos .uob{background:#fff;border-radius:50%;padding:5px}
.endcard .credits{font-size:.82rem;color:var(--muted);line-height:2}
.endcard .credits b{color:var(--text)}
.endcard .track{margin-top:14px;font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:2px;color:var(--cyan)}

/* cinematic, eye-comfortable slide transition (deep navy veil + cyan light sweep) */
.flash{position:absolute;inset:0;z-index:30;opacity:0;pointer-events:none;
  background:
    linear-gradient(100deg, transparent 36%, rgba(34,211,238,.30) 49%, rgba(139,92,246,.18) 51%, transparent 64%),
    radial-gradient(ellipse at 50% 50%, rgba(15,26,46,.94), rgba(6,9,16,.98));
  background-size:320% 100%, 100% 100%; background-position:130% 0, 0 0}
.flash.go{animation:xtrans .72s cubic-bezier(.55,0,.25,1)}
@keyframes xtrans{
  0%{opacity:0;background-position:130% 0,0 0}
  26%{opacity:1}
  60%{opacity:.9}
  100%{opacity:0;background-position:-50% 0,0 0}
}
