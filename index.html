<body>
<div id="app">
  <canvas id="bgCanvas"></canvas>
  <div class="stage" id="stage"></div>

  <!-- HUD -->
  <div class="hud" id="hud" style="opacity:0;transition:opacity .6s">
    <div class="hud-tl">
      <div class="nurai-chip"><img src="logos/nurAI-logo.png" alt="NURAI"><span class="lab">NURAI<br>2026</span></div>
    </div>
    <div class="hud-tr">
      <div class="wordmark"><span class="lock"><svg viewBox="0 0 24 24" fill="none"><rect x="5" y="10" width="14" height="10" rx="2" fill="#04121a"/><path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="#04121a" stroke-width="2"/></svg></span><span>secur</span><span class="ai">AI</span></div>
      <div class="solar-gauge"><span class="sun">☀</span><div class="bar"><i id="solarBar" style="width:94%"></i></div><span class="pct" id="solarPct">94%</span></div>
    </div>
    <div class="uob-wm"><img src="logos/uniLogo.png" alt="University of Baghdad"></div>
    <div class="act-ribbon"><span id="actName">ACT 1 · THE HOOK</span><div class="dotrow" id="dotrow"></div></div>
    <div class="counter" id="counter">STEP 00 / 26</div>
  </div>

  <!-- POPUP -->
  <div class="popup" id="popup">
    <span class="chip" id="pChip">STEP 01</span>
    <h2 id="pTitle">Title</h2>
    <div class="sub" id="pSub" style="display:none"></div>
    <p id="pBody"></p>
    <div class="data" id="pData"></div>
  </div>

  <div class="hint" id="hint">
    <span><kbd>→</kbd> Next</span><span><kbd>←</kbd> Back</span><span><kbd>R</kbd> Replay</span><span><kbd>F</kbd> Fullscreen</span><span><kbd>drag</kbd> move · <kbd>⤡</kbd> resize · <kbd>2×click</kbd> reset card</span>
  </div>
  <div class="flash" id="flash"></div>
</div>

<script>
/* ============ DATA ============ */
const ACTS = [
  {name:'ACT 1 · THE HOOK', from:1, to:6},
  {name:'ACT 2 · CUSTOMER POV', from:7, to:12},
  {name:'ACT 3 · THE AI BRAIN', from:13, to:19},
  {name:'ACT 4 · FUTURE EXPANSION', from:20, to:22},
  {name:'ACT 5 · FINANCIAL PROPOSAL', from:23, to:26},
];

const STEPS = [
  {scene:'idle'}, // 0
  {scene:'node', chip:'STEP 01', title:'UNIVERSITY OF BAGHDAD', body:'A national idea, born on campus.'},
  {scene:'warp', chip:'STEP 02', title:'securAI', body:'A checkout-free smart store. Enter. Shop. Walk out.', data:['4 SUBSYSTEMS','3 PURCHASE CHANNELS','<0.1% BILLING-ERROR TARGET']},
  {scene:'monolith', chip:'STEP 03', title:'ACADEMIC SUPERVISOR', sub:'Dr. Ziad Tariq Allawi', body:'The grid upon which the network is built.'},
  {scene:'team', chip:'STEP 04', title:'THE TEAM', body:'Four engineers. One integrated system.'},
  {scene:'storemap', chip:'STEP 05', title:'THE STORE AT A GLANCE', body:'Every component you’ll see next exists in this room.', data:['ENTRY GATE','SMART SHELVES','CAMERA ARRAY','SOLAR ROOF','EXIT — NO CHECKOUT']},
  {scene:'pov', sub:'enter', chip:'STEP 06', title:'CUSTOMER JOURNEY', body:'You are now the customer. Let’s go shopping.'},
  {scene:'pov', sub:'identity', chip:'STEP 07', title:'PRIVACY-FIRST ENTRY', body:'Face recognition is optional. QR keeps identity in the customer’s hands.', data:['SESSION LINKED — CHANNEL A1','CARD •••• 4417 · PCI-DSS']},
  {scene:'pov', sub:'pickup', chip:'STEP 08', title:'SENSOR FUSION', body:'Camera vision and shelf weight sensors agree before the basket changes.', data:['VISION: YOLO conf 0.97','LOAD CELL: Δ −252g @ B3','MATCH ✓ 0.4s']},
  {scene:'pov', sub:'return', chip:'STEP 09', title:'CHANGE YOUR MIND — INSTANTLY', body:'Returned items leave the basket the moment they touch the shelf.', data:['LOAD CELL: Δ +252g — ITEM RETURNED ✓']},
  {scene:'pov', sub:'bag', chip:'STEP 10', title:'NO LINE OF SIGHT? NO PROBLEM.', body:'Items stay tracked even inside a personal bag.'},
  {scene:'pov', sub:'walkout', chip:'STEP 11', title:'CHECKOUT TIME: 0.0 SECONDS', body:'Auto-charge at the gate. Digital receipt before you reach your car.', data:['CHARGED 9,750 IQD','RECEIPT → APP']},
  {scene:'channels', chip:'STEP 12', title:'ONE BASKET, THREE WAYS TO BUY', body:'Plus a proposed QR / wallet channel for unbanked customers.', data:['A1 — REGISTERED WALK-OUT','A2 — CARD AT GATE','B — APP DELIVERY']},
  {scene:'engine', chip:'STEP 13', title:'INSIDE THE securAI CORE ENGINE', body:'The brain behind every transaction — the engine that powers everything you are about to see.', data:['EDGE AI — JETSON / CORAL < $200','100% ON-PREMISE','THE ENGINE OF EVERY OPERATION']},
  {scene:'wifi', sub:'idle', chip:'STEP 14', title:'WI-FI CSI SENSING GRID', body:'Wi-Fi Channel State Information turns the whole store into a motion sensor — no cameras needed to detect presence.', data:['GRID: 24 SECTORS','CAMERAS: 0 / 8 ACTIVE','POWER DRAW: MINIMAL']},
  {scene:'wifi', sub:'wake', chip:'STEP 15', title:'WAKE ONLY WHERE NEEDED', body:'A CSI disturbance in a sector triggers only that sector’s cameras. Everything else stays asleep.', data:['SECTOR C4 → MOTION ✓','CAMERAS 3 & 4: WAKE 0.2s','ALL OTHERS: SLEEP']},
  {scene:'solar', chip:'STEP 16', title:'100% SOLAR-POWERED. GRID-INDEPENDENT.', body:'Exterior cameras carry integrated panels; all interior hardware runs on stored solar energy.', data:['GEN: 4.2 kW PEAK','STORAGE: 18 kWh','GRID DEPENDENCY: 0%','CSI SLEEP = −60% CAM POWER'], cls:'solar'},
  {scene:'xray', sub:'perception', chip:'STEP 17', title:'THE PERCEPTION STACK', body:'Trained on a local 20–40 SKU catalog. All inference on-edge.', data:['OBJECT DETECTION (YOLO)','POSE ESTIMATION','PERSON RE-ID','SENSOR FUSION']},
  {scene:'xray', sub:'alert', chip:'STEP 18', title:'ALERT MODE: VERIFY, DON’T ACCUSE', body:'Concealment ≠ theft. The item is charged at the gate. No confrontation. Loss → 0.', data:['GESTURE: CONCEAL-TO-POCKET 0.89','CROSS-CHECK: LOAD CELL Δ −180g ✓'], cls:'alert'},
  {scene:'dashboard', chip:'STEP 19', title:'ONE DASHBOARD RUNS THE STORE', body:'Sales · Inventory · Security · Energy — proven model: 375+ checkout-free sites worldwide.'},
  {scene:'robot', sub:'drive', chip:'STEP 20', title:'EXPANSION 1: AUTONOMOUS FULFILLMENT ROBOT', body:'No conveyor. No fixed station. The robot goes to the shelves — any shelf.', data:['NAV: LIDAR + VSLAM','PAYLOAD: 6-DOF ARM','POWER: SOLAR DOCK']},
  {scene:'robot', sub:'pack', chip:'STEP 21', title:'PICKED · PACKED · RECEIPTED', body:'Untouched by human hands.', data:['ORDER #B-1142 · 3/3 ITEMS ✓','RECEIPT PRINTED & ATTACHED','→ DISPATCH']},
  {scene:'drone', chip:'STEP 22', title:'EXPANSION 2: DRONE DELIVERY', body:'From one smart shelf to a city that never stands in line.'},
  {scene:'finance', sub:'scenario', chip:'STEP 23', title:'FINANCIAL PROPOSAL — DEPLOYMENT SCENARIO', body:'', data:['STORE SIZE: 400 m²','8 AISLES · ~5,000 SKU','URBAN RETAIL']},
  {scene:'finance', sub:'towers', chip:'STEP 24', title:'ONE-TIME INVESTMENT vs PERMANENT PAYROLL', body:'securAI replaces a recurring cost with infrastructure.', data:['ANNUAL SAVING: ≈ $25,500 / YEAR']},
  {scene:'finance', sub:'breakeven', chip:'STEP 25', title:'BREAK-EVEN: MONTH 8', body:'From month 9, securAI is pure margin — $60k+ saved over 3 years.'},
  {scene:'endcard', chip:'STEP 26', title:'', body:''},
];

/* ============ DIRECTOR ============ */
let idx = 0;
const stage = document.getElementById('stage');
const popup = document.getElementById('popup');
const hud = document.getElementById('hud');
let dimTimer = null;

function buildDots(){
  const dr = document.getElementById('dotrow');
  dr.innerHTML = '';
  for(let i=1;i<=26;i++){const d=document.createElement('span');d.className='d';d.dataset.i=i;dr.appendChild(d);}
}
function updateDots(){
  document.querySelectorAll('#dotrow .d').forEach(d=>d.classList.toggle('on', +d.dataset.i<=idx));
}
function actFor(i){ return ACTS.find(a=>i>=a.from&&i<=a.to); }

// Per-step popup anchor — curated so the card never overlaps that scene's content.
// Indexed by step number (0 idle & 26 endcard have no card).
const POPUP_POS=[null,'bc','tc','cr','bc','tc','br','bl','br','bl','br','bl','bc','tc','bc','tc','bc','tc','tr','tc','bc','tc','bl','tc','bc','tc',null];

// STATEFUL popup placement — per-step manual position/size, persisted across navigation AND sessions.
let popupOverrides = (()=>{ try{ return JSON.parse(localStorage.getItem('securai_popupPos_v1')) || {}; }catch(e){ return {}; } })();
let applyingPopup = false;
function savePopupOverrides(){ try{ localStorage.setItem('securai_popupPos_v1', JSON.stringify(popupOverrides)); }catch(e){} }
function recordPopup(){
  if(!popup.classList.contains('show')) return;
  const r = popup.getBoundingClientRect();
  popupOverrides[idx] = {left:Math.round(r.left), top:Math.round(r.top), width:Math.round(r.width), height:Math.round(r.height)};
  savePopupOverrides();
}

function setPopup(s){
  if(!s.title){ popup.classList.remove('show'); return; }
  document.getElementById('pChip').textContent = s.chip||'';
  document.getElementById('pTitle').textContent = s.title;
  const sub = document.getElementById('pSub');
  if(s.sub){ sub.style.display='block'; sub.textContent=s.sub; } else sub.style.display='none';
  document.getElementById('pBody').textContent = s.body||'';
  document.getElementById('pBody').style.display = s.body? 'block':'none';
  const dataEl = document.getElementById('pData'); dataEl.innerHTML='';
  (s.data||[]).forEach(d=>{const sp=document.createElement('span');sp.textContent=d;dataEl.appendChild(sp);});
  const pos = POPUP_POS[idx] || 'bc';
  applyingPopup = true;
  popup.style.cssText = '';
  popup.className = 'popup ' + pos + (s.cls? ' '+s.cls : '');
  const ov = popupOverrides[idx];                       // restore a saved place/size if the user set one
  if(ov){
    const w=Math.min(ov.width, innerWidth-8), h=Math.min(ov.height, innerHeight-8);
    const left=Math.max(4,Math.min(innerWidth-w-4, ov.left)), top=Math.max(4,Math.min(innerHeight-h-4, ov.top));
    popup.style.left=left+'px'; popup.style.top=top+'px'; popup.style.right='auto'; popup.style.bottom='auto';
    popup.style.width=w+'px'; popup.style.height=h+'px';
    popup.style.setProperty('--tx','0px'); popup.style.setProperty('--ty','0px');
  }
  void popup.offsetWidth;            // restart the entry spring
  popup.classList.add('show');
  clearTimeout(dimTimer);
  dimTimer = setTimeout(()=>popup.classList.add('dim'), 8000);
  requestAnimationFrame(()=>{ applyingPopup=false; });
}

function render(){
  const s = STEPS[idx];
  hud.style.opacity = idx===0 ? '0' : '1';
  document.getElementById('counter').textContent = 'STEP ' + String(idx).padStart(2,'0') + ' / 26';
  if(idx>0){ const a=actFor(idx); document.getElementById('actName').textContent = a?a.name:''; }
  updateDots();
  setBgMode(s.scene);
  renderScene(s);
  setPopup(s);
}

function next(){ if(idx<STEPS.length-1){ idx++; flash(); render(); } }
function prev(){ if(idx>0){ idx--; flash(); render(); } }
function replay(){ render(); }

function flash(){ const f=document.getElementById('flash'); f.classList.remove('go'); void f.offsetWidth; f.classList.add('go'); }

/* ============ SCENE RENDERER ============ */
function renderScene(s){
  let html = '';
  switch(s.scene){
    case 'idle': html = sceneIdle(); break;
    case 'node': html = sceneNode(); break;
    case 'warp': html = sceneWarp(); break;
    case 'monolith': html = sceneMonolith(); break;
    case 'team': html = sceneTeam(); break;
    case 'storemap': html = sceneStoreMap(); break;
    case 'pov': html = scenePOV(s.sub); break;
    case 'channels': html = sceneChannels(); break;
    case 'engine': html = sceneEngine(); break;
    case 'xray': html = sceneXray(s.sub); break;
    case 'wifi': html = sceneWifi(s.sub); break;
    case 'solar': html = sceneSolar(); break;
    case 'dashboard': html = sceneDashboard(); break;
    case 'robot': html = sceneRobot(s.sub); break;
    case 'drone': html = sceneDrone(); break;
    case 'finance': html = sceneFinance(s.sub); break;
    case 'endcard': html = sceneEndcard(); break;
  }
  stage.innerHTML = '<div class="scene show">'+html+'</div>';
  // post-render hooks
  if(s.scene==='team') setTimeout(animTeam,30);
  if(s.scene==='storemap') setTimeout(animStoreMap,30);
  if(s.scene==='engine') setTimeout(animEngine,30);
  if(s.scene==='pov') setTimeout(()=>animPOV(s.sub),30);
  if(s.scene==='xray') setTimeout(()=>animXray(s.sub),40);
  if(s.scene==='wifi') setTimeout(()=>animWifi(s.sub),40);
  if(s.scene==='solar') setTimeout(animSolar,30);
  if(s.scene==='robot') setTimeout(()=>animRobot(s.sub),40);
  if(s.scene==='drone') setTimeout(animDrone,40);
  if(s.scene==='finance') setTimeout(()=>animFinance(s.sub),40);
}

/* ---- STORE MAP (premium isometric 3D) ---- */
function sceneStoreMap(){
  const TW=42,TH=21,ZS=24,ox=500,oy=185;
  const iso=(x,y,z=0)=>[ox+(x-y)*TW, oy+(x+y)*TH - z*ZS];
  const P=a=>a.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const box=(gx,gy,gw,gd,gh,top,right,front)=>{
    const T=[iso(gx,gy,gh),iso(gx+gw,gy,gh),iso(gx+gw,gy+gd,gh),iso(gx,gy+gd,gh)];
    const R=[iso(gx+gw,gy,gh),iso(gx+gw,gy+gd,gh),iso(gx+gw,gy+gd,0),iso(gx+gw,gy,0)];
    const F=[iso(gx,gy+gd,gh),iso(gx+gw,gy+gd,gh),iso(gx+gw,gy+gd,0),iso(gx,gy+gd,0)];
    return `<polygon points="${P(R)}" fill="${right}"/><polygon points="${P(F)}" fill="${front}"/><polygon points="${P(T)}" fill="${top}"/>`;
  };
  let s='';
  const fl=[iso(0,0),iso(10,0),iso(10,7),iso(0,7)];
  s+=`<polygon points="${P(fl)}" fill="url(#floorIso)" stroke="rgba(34,211,238,.28)"/>`;
  for(let x=1;x<10;x++) s+=`<line x1="${iso(x,0)[0]}" y1="${iso(x,0)[1]}" x2="${iso(x,7)[0]}" y2="${iso(x,7)[1]}" stroke="rgba(34,211,238,.09)"/>`;
  for(let y=1;y<7;y++) s+=`<line x1="${iso(0,y)[0]}" y1="${iso(0,y)[1]}" x2="${iso(10,y)[0]}" y2="${iso(10,y)[1]}" stroke="rgba(34,211,238,.09)"/>`;
  for(let i=0;i<3;i++){ const gx=2+i*2.2;
    s+=box(gx,1.5,1,4,2.2,'rgba(34,211,238,.34)','rgba(20,40,70,.85)','rgba(30,55,92,.85)');
    const e=iso(gx,1.5,2.2),e2=iso(gx+1,1.5,2.2); s+=`<line x1="${e[0]}" y1="${e[1]}" x2="${e2[0]}" y2="${e2[1]}" stroke="#22d3ee" stroke-width="1.5"/>`;
  }
  s+=box(-0.3,2.3,0.3,1.6,1.9,'url(#gateE)','url(#gateE)','url(#gateE)');
  s+=box(10,2.3,0.3,1.6,1.9,'rgba(52,211,153,.55)','rgba(52,211,153,.32)','rgba(52,211,153,.26)');
  [[3,3.5],[5,3.5],[7,3.5]].forEach(c=>{
    const apex=iso(c[0],c[1],4.2), a=iso(c[0]-1,c[1]-1,0),b=iso(c[0]+1,c[1]-1,0),d=iso(c[0]+1,c[1]+1,0),e=iso(c[0]-1,c[1]+1,0);
    s+=`<polygon points="${P([apex,a,e,d,b])}" fill="rgba(34,211,238,.06)"/>`;
    s+=`<circle cx="${apex[0]}" cy="${apex[1]}" r="5" fill="#0a0e1a" stroke="#22d3ee"/><circle cx="${apex[0]}" cy="${apex[1]}" r="2" fill="#22d3ee"/>`;
  });
  [[0.5,0.5],[9.5,0.5],[9.5,6.5],[0.5,6.5]].forEach(c=>{ const a=iso(c[0],c[1],0),b=iso(c[0],c[1],6); s+=`<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="rgba(251,191,36,.3)" stroke-width="2"/>`; });
  const rf=[iso(0.5,0.5,6),iso(9.5,0.5,6),iso(9.5,6.5,6),iso(0.5,6.5,6)];
  s+=`<polygon points="${P(rf)}" fill="url(#solarIso)" stroke="rgba(251,191,36,.5)"/>`;
  for(let x=1;x<10;x++){ const a=iso(x,0.5,6),b=iso(x,6.5,6); s+=`<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="rgba(251,191,36,.3)"/>`; }
  return `<div class="smap"><div class="smap-stage" id="smapStage"><div class="smap-inner">
    <svg viewBox="0 0 1000 560">
      <defs>
        <linearGradient id="floorIso" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#16223f"/><stop offset="1" stop-color="#0a1120"/></linearGradient>
        <linearGradient id="solarIso" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="rgba(251,191,36,.25)"/><stop offset="1" stop-color="rgba(251,191,36,.05)"/></linearGradient>
        <linearGradient id="gateE" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
      </defs>${s}
    </svg>
    <div class="smap-label amber" style="left:41%;top:5%"><span class="dot"></span>☀ 100% Solar Roof</div>
    <div class="smap-label" style="left:5%;top:47%"><span class="dot"></span>Entry Gate</div>

    <div class="smap-label" style="left:39%;top:64%"><span class="dot"></span>Smart Shelves · Load Cells</div>
    <div class="smap-label" style="left:28%;top:21%"><span class="dot"></span>Ceiling Camera Array</div>
  </div></div></div>`;
}
function animStoreMap(){
  document.querySelectorAll('.smap-label').forEach((l,i)=>setTimeout(()=>l.classList.add('in'),300+i*170));

function povCorridorSVG(){
  const lerp=(a,b,t)=>[a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t];
  const flL=[40,560],flR=[960,560],clL=[40,-10],clR=[960,-10];
  const dTL=[440,150],dTR=[560,150],dBL=[440,360],dBR=[560,360];
  const pt=p=>p[0].toFixed(0)+','+p[1].toFixed(0);
  let g='';
  g+=`<polygon points="${pt(flL)} ${pt(flR)} ${pt(dBR)} ${pt(dBL)}" fill="url(#floorG)"/>`;
  for(const t of [0.22,0.44,0.64,0.82]){const a=lerp(flL,dBL,t),b=lerp(flR,dBR,t);g+=`<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="rgba(34,211,238,.10)"/>`;}
  for(let i=1;i<10;i++){const n=lerp(flL,flR,i/10),f=lerp(dBL,dBR,i/10);g+=`<line x1="${n[0]}" y1="${n[1]}" x2="${f[0]}" y2="${f[1]}" stroke="rgba(34,211,238,.07)"/>`;}
  g+=`<polygon points="${pt(clL)} ${pt(clR)} ${pt(dTR)} ${pt(dTL)}" fill="url(#ceilG)"/>`;
  for(let i=1;i<8;i++){const n=lerp(clL,clR,i/8),f=lerp(dTL,dTR,i/8);g+=`<line x1="${n[0]}" y1="${n[1]}" x2="${f[0]}" y2="${f[1]}" stroke="rgba(255,236,200,.05)"/>`;}
  g+=`<polygon points="${pt(clL)} ${pt(flL)} ${pt(dBL)} ${pt(dTL)}" fill="url(#wallLG)"/>`;
  g+=`<polygon points="${pt(clR)} ${pt(flR)} ${pt(dBR)} ${pt(dTR)}" fill="url(#wallRG)"/>`;
  for(const h of [0.34,0.52,0.7]){
    const nL=lerp(clL,flL,h),fL=lerp(dTL,dBL,h); g+=`<line x1="${nL[0]}" y1="${nL[1]}" x2="${fL[0]}" y2="${fL[1]}" stroke="rgba(34,211,238,.45)" stroke-width="2"/>`;
    const nR=lerp(clR,flR,h),fR=lerp(dTR,dBR,h); g+=`<line x1="${nR[0]}" y1="${nR[1]}" x2="${fR[0]}" y2="${fR[1]}" stroke="rgba(34,211,238,.45)" stroke-width="2"/>`;
  }
  g+=`<rect x="440" y="150" width="120" height="210" rx="12" fill="url(#exitG)"/><rect x="440" y="150" width="120" height="210" rx="12" fill="none" stroke="rgba(255,242,214,.6)" stroke-width="1.5"/>`;
  return `<svg viewBox="0 0 1000 560" preserveAspectRatio="xMidYMid slice" style="position:absolute;inset:0;width:100%;height:100%">
    <defs>
      <linearGradient id="floorG" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#0b1325"/><stop offset="1" stop-color="#22324f"/></linearGradient>
      <linearGradient id="ceilG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#090d18"/><stop offset="1" stop-color="#141f38"/></linearGradient>
      <linearGradient id="wallLG" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1d2a48"/><stop offset="1" stop-color="#0c1322"/></linearGradient>
      <linearGradient id="wallRG" x1="1" y1="0" x2="0" y2="0"><stop offset="0" stop-color="#1d2a48"/><stop offset="1" stop-color="#0c1322"/></linearGradient>
      <radialGradient id="exitG" cx="0.5" cy="0.5" r="0.6"><stop offset="0" stop-color="#fff7e6"/><stop offset="0.55" stop-color="#ffd9a0"/><stop offset="1" stop-color="#e6a056"/></radialGradient>
    </defs>${g}
  </svg>`;
}

/* ---- SOLAR ---- */
function sceneSolar(){
  const TW=42,TH=22,ZS=22,ox=460,oy=300;
  const iso=(x,y,z=0)=>[ox+(x-y)*TW, oy+(x+y)*TH - z*ZS];
  const P=a=>a.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const BW=6,BD=5,GH=3.6;
  let g='';
  const gc=iso(BW/2,BD/2,0);
  g+=`<ellipse cx="${gc[0]}" cy="${(gc[1]+44).toFixed(1)}" rx="210" ry="50" fill="rgba(0,0,0,.35)"/>`;
  // walls
  g+=`<polygon points="${P([iso(BW,0,GH),iso(BW,BD,GH),iso(BW,BD,0),iso(BW,0,0)])}" fill="url(#solWallR)"/>`;
  g+=`<polygon points="${P([iso(0,BD,GH),iso(BW,BD,GH),iso(BW,BD,0),iso(0,BD,0)])}" fill="url(#solWallF)"/>`;
  for(const hh of [1.0,1.9,2.8]){ const a=iso(0,BD,hh),b=iso(BW,BD,hh); g+=`<line x1="${a[0].toFixed(1)}" y1="${a[1].toFixed(1)}" x2="${b[0].toFixed(1)}" y2="${b[1].toFixed(1)}" stroke="rgba(34,211,238,.28)" stroke-width="1.4"/>`; }
  g+=`<polygon points="${P([iso(2.2,BD,1.7),iso(3.8,BD,1.7),iso(3.8,BD,0),iso(2.2,BD,0)])}" fill="url(#solDoor)"/>`;
  const sgn=iso(BW/2,BD,2.55); g+=`<text x="${sgn[0].toFixed(1)}" y="${sgn[1].toFixed(1)}" text-anchor="middle" font-size="13" font-weight="900" fill="#22d3ee">securAI</text>`;
  // solar roof panels
  for(let i=0;i<BW;i++) for(let j=0;j<BD;j++){
    const q=[iso(i,j,GH),iso(i+1,j,GH),iso(i+1,j+1,GH),iso(i,j+1,GH)];
    g+=`<polygon points="${P(q)}" fill="${(i+j)%2?'url(#solPanA)':'url(#solPanB)'}" stroke="#070d1c" stroke-width="1.1"/>`;
  }
  g+=`<polygon points="${P([iso(0,0,GH),iso(BW,0,GH),iso(BW,BD,GH),iso(0,BD,GH)])}" fill="none" stroke="rgba(251,191,36,.65)" stroke-width="2.5"/>`;
  const roofMid=iso(BW/2,BD/2,GH);
  for(let r=0;r<3;r++){ const tx=roofMid[0]-62+r*62; g+=`<line class="sol-flow-a" x1="${tx.toFixed(1)}" y1="44" x2="${(tx-8).toFixed(1)}" y2="${(roofMid[1]-8).toFixed(1)}"/>`; }
  // battery bank
  const bx=7.6,by=1.5,bw=1.5,bd=1.8,bh=1.7;
  g+=`<polygon points="${P([iso(bx+bw,by,bh),iso(bx+bw,by+bd,bh),iso(bx+bw,by+bd,0),iso(bx+bw,by,0)])}" fill="#0c1730"/>`;
  g+=`<polygon points="${P([iso(bx,by+bd,bh),iso(bx+bw,by+bd,bh),iso(bx+bw,by+bd,0),iso(bx,by+bd,0)])}" fill="url(#solBatF)"/>`;
  g+=`<polygon points="${P([iso(bx,by,bh),iso(bx+bw,by,bh),iso(bx+bw,by+bd,bh),iso(bx,by+bd,bh)])}" fill="url(#solBatT)" stroke="rgba(52,211,153,.85)" stroke-width="2"/>`;
  const batTop=iso(bx+bw/2,by+bd/2,bh);
  g+=`<text x="${batTop[0].toFixed(1)}" y="${(batTop[1]-20).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="800" fill="#34d399">⚡ STORAGE</text>`;
  g+=`<line class="sol-flow-a" x1="${roofMid[0].toFixed(1)}" y1="${roofMid[1].toFixed(1)}" x2="${batTop[0].toFixed(1)}" y2="${batTop[1].toFixed(1)}"/>`;
  // powered subsystems
  const nodes=[[iso(0.6,-1.3,4.3),'📷','Cameras'],[iso(-1.5,1.5,2.6),'📶','Wi-Fi CSI'],[iso(1.4,6.3,0.4),'🚪','Gates'],[iso(4.6,6.3,0.4),'⚖️','Shelves'],[iso(9.4,2.7,1.0),'🧠','Edge AI']];
  nodes.forEach(nd=>{ const [x,y]=nd[0]; g+=`<line class="sol-flow-c" x1="${batTop[0].toFixed(1)}" y1="${batTop[1].toFixed(1)}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}"/>`; });
  nodes.forEach(nd=>{ const [x,y]=nd[0],label=nd[2],w=label.length*6.2+34;
    g+=`<g><circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="14" fill="rgba(8,14,26,.92)" stroke="#22d3ee" stroke-width="1.5"/>

function animCount(id,to,suffix,dec){
  const el=document.getElementById(id); if(!el) return; let start=null;
  (function step(ts){ if(!document.getElementById(id)) return; if(start===null) start=ts;
    const p=Math.min(1,(ts-start)/1200); el.textContent=(to*p).toFixed(dec)+suffix; if(p<1) requestAnimationFrame(step);
  })(performance.now());
}
function animSolar(){
  if(!document.getElementById('solScene')) return;
  animCount('solGen',4.2,'kW',1); animCount('solSto',18,'kWh',0);
  let t=0.04;
  (function loop(){
    if(!document.getElementById('solScene')) return;
    t+=0.0032; if(t>1) t=0;
    const ang=Math.PI*t, sun=document.getElementById('solSun'), night=document.getElementById('solNight'),
      stars=document.getElementById('solStars'), lbl=document.getElementById('solDayNight');
    const sx=8+t*84, sy=64-Math.sin(ang)*52;
    if(sun){ sun.style.left=sx+'%'; sun.style.top=sy+'%'; sun.style.opacity=Math.max(.05,Math.sin(ang)).toFixed(2); }
    const isNight=Math.sin(ang)<0.16;
    if(night) night.style.opacity=isNight?'1':'0';
    if(stars) stars.style.opacity=isNight?'.9':'0';
    if(lbl) lbl.innerHTML=isNight?'🌙 NIGHT · RUNNING ON STORED SOLAR — STILL FULLY ONLINE':'☀ DAYTIME · GENERATING &amp; STORING ENERGY';
    requestAnimationFrame(loop);
  })();
}

};
function tradMonthly(){
  const wages=(FIN.trad.wagesAnnual*FIN.wageMult)/12;
  const energy=FIN.trad.energyAnnual/12;
  const shrink=(FIN.trad.revenue*(FIN.shrinkPct/100))/12;
  return wages+energy+shrink;
}
function breakevenMonth(){
  const tm=tradMonthly();
  return (FIN.secur.capex-FIN.trad.capex)/(tm-FIN.secur.monthly);
}

function drawChart(){
  const c=document.getElementById('finChart'); if(!c) return;
  const dpr=window.devicePixelRatio||1;
  const W=c.clientWidth, H=c.clientHeight;
  c.width=W*dpr; c.height=H*dpr; const ctx=c.getContext('2d'); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  const pad={l:60,r:30,t:30,b:40}, months=36;
  const tm=tradMonthly();
  const maxY=Math.max(FIN.trad.capex+tm*months, FIN.secur.capex+FIN.secur.monthly*months)*1.05;
  const X=m=>pad.l+(W-pad.l-pad.r)*(m/months);
  const Y=v=>H-pad.b-(H-pad.t-pad.b)*(v/maxY);
  // grid
  ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1; ctx.font='11px JetBrains Mono'; ctx.fillStyle='#94a3b8';
  for(let i=0;i<=6;i++){const m=i*6;ctx.beginPath();ctx.moveTo(X(m),pad.t);ctx.lineTo(X(m),H-pad.b);ctx.stroke();
    ctx.fillText('M'+m,X(m)-8,H-pad.b+18);}
  for(let i=0;i<=4;i++){const v=maxY*i/4;ctx.beginPath();ctx.moveTo(pad.l,Y(v));ctx.lineTo(W-pad.r,Y(v));ctx.stroke();
    ctx.fillText('$'+Math.round(v/1000)+'k',8,Y(v)+4);}
  // traditional line
  function line(capex,mo,color,fill){
    ctx.beginPath();
    for(let m=0;m<=months;m++){const x=X(m),y=Y(capex+mo*m);m===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke();
  }
  // savings fill between lines (after breakeven)
  const be=breakevenMonth();
  ctx.beginPath();
  for(let m=0;m<=months;m++){ctx.lineTo(X(m),Y(FIN.trad.capex+tm*m));}
  for(let m=months;m>=0;m--){ctx.lineTo(X(m),Y(FIN.secur.capex+FIN.secur.monthly*m));}
  ctx.closePath(); ctx.fillStyle='rgba(52,211,153,.12)'; ctx.fill();
  line(FIN.trad.capex,tm,'#f87171');
  line(FIN.secur.capex,FIN.secur.monthly,'#22d3ee');
  // breakeven marker
  if(be>0&&be<months){
    const bx=X(be), by=Y(FIN.secur.capex+FIN.secur.monthly*be);
    ctx.strokeStyle='rgba(251,191,36,.7)';ctx.lineWidth=2;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(bx,pad.t);ctx.lineTo(bx,H-pad.b);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(bx,by,6,0,7);ctx.fill();
    const badge=document.getElementById('beBadge');
    badge.textContent='BREAK-EVEN: MONTH '+Math.ceil(be);
    badge.style.left=(bx/W*100)+'%'; badge.style.top='18%'; badge.classList.add('show');
  }
  // legend
  ctx.font='12px Inter';
  ctx.fillStyle='#f87171';ctx.fillRect(W-200,pad.t-14,12,12);ctx.fillStyle='#e8edf7';ctx.fillText('Traditional cashier',W-182,pad.t-4);
  ctx.fillStyle='#22d3ee';ctx.fillRect(W-200,pad.t+6,12,12);ctx.fillStyle='#e8edf7';ctx.fillText('securAI',W-182,pad.t+16);
}

function loop(){
  ctx.clearRect(0,0,W,H);
  const pal=PALETTES[bgMode]||PALETTES.idle;
  // ambient gradient glow
  const g=ctx.createRadialGradient(W*.7,H*.3,0,W*.7,H*.3,W*.7);
  g.addColorStop(0,hexA(pal[0],bgMode==='solar'?.10:.07)); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const g2=ctx.createRadialGradient(W*.2,H*.8,0,W*.2,H*.8,W*.6);
  g2.addColorStop(0,hexA(pal[pal.length-1],.06)); g2.addColorStop(1,'transparent');
  ctx.fillStyle=g2; ctx.fillRect(0,0,W,H);
  // particles + links
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>W)p.vx*=-1; if(p.y<0||p.y>H)p.vy*=-1;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fillStyle=hexA(pal[0],.5);ctx.fill();});
  for(let i=0;i<particles.length;i++)for(let j=i+1;j<particles.length;j++){
    const a=particles[i],b=particles[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy);
    if(d<120){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
      ctx.strokeStyle=hexA(pal[1],.10*(1-d/120));ctx.lineWidth=1;ctx.stroke();}
  }
  requestAnimationFrame(loop);
}
function hexA(hex,a){const n=parseInt(hex.slice(1),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}

/* ============ INPUT ============ */
// Use e.code (physical key) so shortcuts work under any keyboard layout (e.g. Arabic).
addEventListener('keydown',e=>{
  const k=e.code;
  if(k==='ArrowRight'||k==='Space'||k==='PageDown'||k==='Enter'){e.preventDefault();next();}
  else if(k==='ArrowLeft'||k==='PageUp'){e.preventDefault();prev();}
  else if(k==='KeyR'){e.preventDefault();replay();}
  else if(k==='KeyF'){e.preventDefault();toggleFull();}
  else if(k==='KeyW'){ if(STEPS[idx].scene==='wifi') wifiHotkeyW(); }
  else if(k==='KeyA'){ if(STEPS[idx].scene==='xray') animXray('alert'); }
  else if(k==='KeyS'){ if(STEPS[idx].scene==='finance'){ const ws=document.getElementById('wageSlider'); if(ws){ws.value=ws.value>100?80:130;ws.oninput();} } }
});
addEventListener('click',e=>{ if(e.target.closest('.popup, .no-adv, input')) return; next(); });
function toggleFull(){
  try{
    if(!document.fullscreenElement){ const p=document.documentElement.requestFullscreen(); if(p&&p.catch) p.catch(()=>{}); }
    else { const p=document.exitFullscreen(); if(p&&p.catch) p.catch(()=>{}); }
  }catch(err){}
}

/* ---- draggable + resizable + STATEFUL explanation card ---- */
let dragP=null, popupMoved=false, resizing=false, startSize=null;
popup.addEventListener('pointerdown',e=>{
  if(e.target.closest('input')) return;                       // let sliders work
  const r=popup.getBoundingClientRect();
  if(e.clientX>r.right-26 && e.clientY>r.bottom-26){ resizing=true; startSize={w:r.width,h:r.height}; return; } // native resize grip
  e.preventDefault();
  popup.classList.remove('dim');
  dragP={dx:e.clientX-r.left, dy:e.clientY-r.top}; popupMoved=false;
  popup.classList.add('dragging');
  popup.style.left=r.left+'px'; popup.style.top=r.top+'px';
  popup.style.right='auto'; popup.style.bottom='auto';
  popup.style.setProperty('--tx','0px'); popup.style.setProperty('--ty','0px');
  popup.setPointerCapture(e.pointerId);
});
popup.addEventListener('pointermove',e=>{
  if(!dragP) return; popupMoved=true;
  let x=e.clientX-dragP.dx, y=e.clientY-dragP.dy;
  x=Math.max(4,Math.min(innerWidth-popup.offsetWidth-4,x));
  y=Math.max(4,Math.min(innerHeight-popup.offsetHeight-4,y));
  popup.style.left=x+'px'; popup.style.top=y+'px';
});
addEventListener('pointerup',()=>{
  if(dragP){ if(popupMoved) recordPopup(); dragP=null; popupMoved=false; popup.classList.remove('dragging'); }
  else if(resizing){ const r=popup.getBoundingClientRect(); if(Math.abs(r.width-startSize.w)>2||Math.abs(r.height-startSize.h)>2) recordPopup(); resizing=false; }
});
popup.addEventListener('pointercancel',()=>{ dragP=null; resizing=false; popup.classList.remove('dragging'); });
// double-click resets THIS step's card to its default place/size
popup.addEventListener('dblclick',e=>{ e.stopPropagation(); delete popupOverrides[idx]; savePopupOverrides(); setPopup(STEPS[idx]); });

/* ============ INIT ============ */
resize(); initParticles(); loop(); buildDots(); render();
</script>
